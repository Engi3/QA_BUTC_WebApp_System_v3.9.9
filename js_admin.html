<script>
// ============================================================
// js_admin.html — Admin CRUD (FIXED: no template literals,
//   no arrow-fn destructuring, no '' quote delimiters,
//   uses data-* + event delegation for onclick callbacks)
// ============================================================

// ── Modal close helpers ───────────────────────────────────────
function _closeIconPicker()  { var e=document.getElementById("icon-picker-modal");  if(e)e.remove(); }
function _closeColorPicker() { var e=document.getElementById("color-picker-modal"); if(e)e.remove(); }

// ── Icon Picker ───────────────────────────────────────────────
// ── อัปเดต Icon & Color Picker ให้ใช้ร่วมกันได้ ───────────
let _pickerTarget = "section"; // ตัวแปรเก็บเป้าหมายว่ากำลังแก้ Section หรือ Dept

function openIconPicker(target) {
  _pickerTarget = target || "section";
  _closeIconPicker();
  var icons = "";
  for (var k=0; k<ICONS.length; k++) {
    var ic = ICONS[k][0], lb = ICONS[k][1];
    icons += '<div class="qa-icon-pick-item" data-icon="' + escHtml(ic) + '" style="padding:10px 4px;border:1.5px solid var(--glass-border);border-radius:8px;background:var(--glass-bg);cursor:pointer;text-align:center;font-size:.69rem;color:var(--txt-muted);transition:.18s;"><i class="bi ' + escHtml(ic) + '" style="font-size:1.3rem;display:block;margin-bottom:4px;"></i>' + escHtml(lb) + '</div>';
  }
  // ... (HTML กล่องเหมือนเดิม ข้ามมาตอนกดเลือก)
  document.body.insertAdjacentHTML("beforeend", '<div id="icon-picker-modal" onclick="_iconPickerBg(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;"><div onclick="event.stopPropagation();" style="background:var(--glass-bg);border:1.5px solid var(--glass-border);border-radius:16px;width:100%;max-width:560px;max-height:78vh;overflow:hidden;display:flex;flex-direction:column;"><div style="background:var(--hero-grad);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;"><i class="bi bi-grid-3x3-gap-fill me-2"></i>เลือกไอคอน</span><button type="button" onclick="_closeIconPicker()" style="background:rgba(255,255,255,.2);border:none;color:white;border-radius:50%;width:28px;height:28px;cursor:pointer;"><i class="bi bi-x"></i></button></div><div style="overflow-y:auto;padding:14px;"><div id="icon-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;">' + icons + '</div></div></div></div>');
  
  document.getElementById("icon-grid").addEventListener("click", function(e) {
    var item = e.target.closest(".qa-icon-pick-item"); if (item) selectIcon(item.getAttribute("data-icon"));
  });
}

function selectIcon(icon) {
  document.getElementById(_pickerTarget + "-icon-hidden").value = icon;
  var p = document.getElementById(_pickerTarget + "-icon-preview");
  if (p) p.innerHTML = '<i class="bi ' + escHtml(icon) + ' me-2"></i>' + escHtml(icon);
  _closeIconPicker();
}

function openColorPicker(target) {
  _pickerTarget = target || "section";
  _closeColorPicker();
  var cols = "";
  for (var k=0; k<COLORS.length; k++) {
    var c = COLORS[k];
    cols += '<div class="qa-color-pick-item" data-val="' + escHtml(c.v) + '" data-hex="' + escHtml(c.h) + '" style="padding:10px 6px;border:2px solid transparent;border-radius:10px;background:var(--glass-bg);cursor:pointer;text-align:center;transition:.18s;"><div style="width:30px;height:30px;background:' + c.h + ';border-radius:50%;margin:0 auto 5px;"></div><div style="font-size:.71rem;font-weight:700;color:var(--txt-2);">' + escHtml(c.l) + '</div></div>';
  }
  document.body.insertAdjacentHTML("beforeend", '<div id="color-picker-modal" onclick="_colorPickerBg(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;"><div onclick="event.stopPropagation();" style="background:var(--glass-bg);border:1.5px solid var(--glass-border);border-radius:16px;width:100%;max-width:440px;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;"><div style="background:var(--hero-grad);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;"><i class="bi bi-palette-fill me-2"></i>เลือกสีธีม</span><button type="button" onclick="_closeColorPicker()" style="background:rgba(255,255,255,.2);border:none;color:white;border-radius:50%;width:28px;height:28px;cursor:pointer;"><i class="bi bi-x"></i></button></div><div style="overflow-y:auto;padding:14px;"><div id="color-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:9px;">' + cols + '</div></div></div></div>');
  
  document.getElementById("color-grid").addEventListener("click", function(e) {
    var item = e.target.closest(".qa-color-pick-item");
    if (item) selectColor(item.getAttribute("data-val"), item.getAttribute("data-hex"));
  });
}

// ✅ 1. ฟังก์ชันรับค่าสีแบบ Custom
function applyCustomColor(target, hexColor) {
  document.getElementById(target + "-color-hidden").value = hexColor;
  var p = document.getElementById(target + "-color-preview");
  if (p) p.innerHTML = '<span class="qa-color-dot" style="background:' + escHtml(hexColor) + ';"></span>สีพิเศษ';
}

// ✅ 2. อัปเดตฟังก์ชันสีธรรมดา ให้ลิงก์กับกล่อง Custom ด้วย
function selectColor(value, hex) {
  document.getElementById(_pickerTarget + "-color-hidden").value = value;
  var p = document.getElementById(_pickerTarget + "-color-preview");
  var label = value;
  for (var k=0; k<COLORS.length; k++) { if (COLORS[k].v===value) { label=COLORS[k].l; hex=COLORS[k].h; break; } }
  if (p) p.innerHTML = '<span class="qa-color-dot" style="background:' + escHtml(hex) + ';"></span>' + escHtml(label);
  
  // ซิงค์สีไปที่กล่อง color picker
  var customInput = document.getElementById(_pickerTarget + "-custom-color");
  if(customInput) customInput.value = hex;
  
  _closeColorPicker();
}

// ✅ 3. อัปเดตตอนกด Edit ให้โหลดสี Custom มาแสดง
function editDepartment(deptId) {
  var dept = APP.departments.find(function(d){ return d.deptId === deptId; });
  if (!dept) return;
  document.getElementById("dept-id-hidden").value = dept.deptId;
  document.getElementById("dept-name").value = dept.deptName;
  document.getElementById("dept-desc").value = dept.description || "";
  _pickerTarget = "dept";
  selectIcon(dept.iconClass || "bi-building");
  
  // เช็คว่าเป็นสี Custom (Hex) หรือสี Standard
  if (dept.colorClass && dept.colorClass.indexOf("#") === 0) {
    applyCustomColor('dept', dept.colorClass);
    document.getElementById("dept-custom-color").value = dept.colorClass;
  } else {
    selectColor(dept.colorClass || "indigo", "");
  }
  
  populateDeptSectionsCheckboxes(dept.assignedSections || []);
  var btn = document.getElementById("btn-save-dept");
  if (btn) btn.innerHTML = '<i class="bi bi-pencil-fill me-1"></i>แก้ไข';
  document.getElementById("dept-form").scrollIntoView({behavior:"smooth"});
}

function editSection(secId) {
  var sec = APP.sections.find(function(s){ return s.sectionId === secId; });
  if (!sec) return;
  document.getElementById("section-id-hidden").value = sec.sectionId;
  document.getElementById("section-name").value = sec.sectionName;
  document.getElementById("section-desc").value = sec.description || "";
  _pickerTarget = "section";
  selectIcon(sec.iconClass || "bi-folder");
  
  // เช็คว่าเป็นสี Custom (Hex) หรือสี Standard
  if (sec.colorClass && sec.colorClass.indexOf("#") === 0) {
    applyCustomColor('section', sec.colorClass);
    document.getElementById("section-custom-color").value = sec.colorClass;
  } else {
    selectColor(sec.colorClass || "blue", "");
  }
  
  var forms = APP.forms.filter(function(f){ return f.sectionId === secId && f.isActive; }).map(function(f){ return f.formId; });
  populateSectionFormCheckboxes(forms);
  var btn = document.getElementById("btn-save-section");
  if (btn) btn.innerHTML = '<i class="bi bi-pencil-fill me-1"></i>แก้ไข';
  document.getElementById("section-form").scrollIntoView({behavior:"smooth"});
}


// ฟังก์ชันสำหรับหาว่า User คนนี้รับผิดชอบ Department ไหนบ้าง (คำนวณจาก Section ที่มี)
function getDeptsFromSections(secIds) {
  var deptIds = [];
  (APP.departments || []).forEach(function(d) {
    if (d.assignedSections && d.assignedSections.length > 0) {
      // ถ้า User มี Section ใดๆ ที่ตรงกับใน Department นี้ ให้ถือว่าดูแล Department นี้
      var hasAny = d.assignedSections.some(function(s) { return secIds.includes(s); });
      if (hasAny) deptIds.push(d.deptId);
    }
  });
  return deptIds;
}

// ── ฟังก์ชันใหม่: จัดการ Department ───────────
function populateDeptSectionsCheckboxes(selectedIds) { 
  buildSectionChips("dept-sections-checkboxes", selectedIds||[]); 
}

function clearDeptForm() {
  document.getElementById("dept-id-hidden").value = "";
  document.getElementById("dept-name").value = "";
  document.getElementById("dept-desc").value = "";
  document.getElementById("dept-icon-hidden").value = "bi-building";
  document.getElementById("dept-icon-preview").innerHTML = '<i class="bi bi-building me-2"></i>bi-building';
  document.getElementById("dept-color-hidden").value = "indigo";
  document.getElementById("dept-color-preview").innerHTML = '<span class="qa-color-dot" style="background:#4338ca;"></span>Indigo';
  populateDeptSectionsCheckboxes([]);
  var btn = document.getElementById("btn-save-dept");
  if (btn) btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก';
}

function renderDepartmentList() {
  var c = document.getElementById("dept-list-table"); if (!c) return;
  if (!APP.departments || !APP.departments.length) {
    c.innerHTML = '<p style="color:var(--txt-muted);text-align:center;padding:24px 0;"><i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:8px;"></i>ยังไม่มี Department</p>'; return;
  }
  var rows = "";
  APP.departments.forEach(function(d) {
    var ch = "#4338ca";
    for (var ci=0; ci<COLORS.length; ci++) { if (COLORS[ci].v===d.colorClass) { ch=COLORS[ci].h; break; } }
    
    var secNames = (d.assignedSections||[]).map(function(sid) {
      for (var si=0; si<APP.sections.length; si++) { if (APP.sections[si].sectionId===sid) return APP.sections[si].sectionName; }
      return sid;
    }).join(", ");

    rows += '<tr>'
      + '<td><i class="bi ' + escHtml(d.iconClass||"bi-building") + '" style="color:' + ch + ';font-size:1.1rem;"></i></td>'
      + '<td><strong style="color:var(--txt);">' + escHtml(d.deptName) + '</strong><br><small style="color:var(--txt-muted);">' + escHtml(d.description||"") + '</small></td>'
      + '<td><span class="qa-role-tag manager" style="background:rgba(67,56,202,0.1);color:#4338ca;">' + (d.assignedSections||[]).length + ' งานย่อย</span></td>'
      + '<td>'
      + '<button class="qa-btn-ghost btn-sm me-1" onclick="editDepartment(\'' + escHtml(d.deptId) + '\')"><i class="bi bi-pencil"></i></button>'
      + '<button class="qa-btn-danger btn-sm" onclick="openDeleteConfirm(\'dept\', \'' + escHtml(d.deptId) + '\', \'' + escHtml(d.deptName) + '\')"><i class="bi bi-trash"></i></button>'
      + '</td></tr>';
  });
  c.innerHTML = '<div class="table-responsive"><table class="qa-table"><thead><tr><th>ไอคอน</th><th>ชื่อ Department</th><th>จำนวนงานย่อย</th><th>จัดการ</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function handleSaveDepartment(event) {
  event.preventDefault();
  var btn = document.getElementById("btn-save-dept");
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span> กำลังบันทึก...'; }
  
  var af = getSelectedChips("dept-sections-checkboxes");
  var rawColor = document.getElementById("dept-color-hidden").value||"indigo";
  var data = {
    deptId: document.getElementById("dept-id-hidden").value||"",
    deptName: (document.getElementById("dept-name").value||"").trim(),
    description: (document.getElementById("dept-desc").value||"").trim(),
    iconClass: document.getElementById("dept-icon-hidden").value||"bi-building",
    colorClass: rawColor,
    isActive: true, assignedSections: af
  };
  
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึก'; }
      if (res&&res.success) {
        showToast(res.message||"สำเร็จ","success");
        // ✅ สั่งให้รีเฟรชข้อมูลหลังบ้าน และวาดตาราง + ปุ่มตัวเลือก Manager ใหม่
        refreshAllData(function(){ 
          renderDepartmentList(); 
          clearDeptForm(); 
          if (typeof buildDeptChips === 'function') {
            buildDeptChips("mgr-dept-checkboxes", []); 
          }
        });
      } else showToast((res&&res.message)||"เกิดข้อผิดพลาด","danger");
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึก'; }
      showToast(err.message||err,"danger");
    })
    .saveDepartment(data);
}



// ── Section chips ─────────────────────────────────────────────
function populateSectionFormCheckboxes(selectedIds) {
  buildFormChips("section-form-checkboxes", selectedIds || []);
}
function clearSectionForm() {
  document.getElementById("section-id-hidden").value = "";
  document.getElementById("section-name").value      = "";
  document.getElementById("section-desc").value      = "";
  document.getElementById("section-icon-hidden").value = "bi-folder";
  document.getElementById("section-icon-preview").innerHTML = '<i class="bi bi-folder me-2"></i>bi-folder';
  document.getElementById("section-color-hidden").value = "blue";
  document.getElementById("section-color-preview").innerHTML = '<span class="qa-color-dot" style="background:#2563eb;"></span>Blue';
  populateSectionFormCheckboxes([]);
  var btn = document.getElementById("btn-save-section");
  if (btn) btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก';
}


function handleSaveSection(event) {
  event.preventDefault();
  var btn = document.getElementById("btn-save-section");
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span> กำลังบันทึก...'; }
  var af   = getSelectedChips("section-form-checkboxes");
  var rawColor = document.getElementById("section-color-hidden").value||"blue";
  var customHex = "";
  var colorClass = rawColor;
  if (rawColor.indexOf("custom:") === 0) { customHex = rawColor.replace("custom:",""); colorClass = "custom"; }
  var data = {
    sectionId:   document.getElementById("section-id-hidden").value||"",
    sectionName: (document.getElementById("section-name").value||"").trim(),
    description: (document.getElementById("section-desc").value||"").trim(),
    iconClass:   document.getElementById("section-icon-hidden").value||"bi-folder",
    colorClass:  colorClass,
    customColor: customHex,
    isActive: true, assignedFormIDs: af
  };
  if (!data.sectionName) {
    showToast("กรุณาใส่ชื่อ Section","warning");
    if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึก'; } return;
  }
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึก'; }
      if (res&&res.success) {
        showToast(res.message||"สำเร็จ","success");
        refreshAllData(function(){
          renderSectionList(); populateSectionFormCheckboxes();
          populateMgrSectionsCheckboxes(); populateSettingsSectionsCheckboxes();
          populateRegisterSections(); renderAdminDashboard(); renderPublicDashboard(); clearSectionForm();
        });
      } else showToast((res&&res.message)||"เกิดข้อผิดพลาด","danger");
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึก'; }
      showToast(err.message||err,"danger");
    })
    .saveSection(data);
}
function renderSectionList() {
  var c = document.getElementById("section-list-table"); if (!c) return;
  if (!APP.sections.length) {
    c.innerHTML = '<p style="color:var(--txt-muted);text-align:center;padding:24px 0;"><i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:8px;"></i>ยังไม่มี Section</p>'; return;
  }
  var rows = "";
  for (var k=0; k<APP.sections.length; k++) {
    var s = APP.sections[k];
    var ch = "#2563eb";
    for (var ci=0; ci<COLORS.length; ci++) { if (COLORS[ci].v===s.colorClass) { ch=COLORS[ci].h; break; } }
    var fn = "";
    (s.assignedFormIDs||[]).forEach(function(fid) {
      for (var fi=0; fi<APP.forms.length; fi++) { if (APP.forms[fi].formId===fid) { fn+=(fn?", ":"")+APP.forms[fi].formName; break; } }
    });
    rows += '<tr>'
      + '<td><i class="bi ' + escHtml(s.iconClass||"bi-folder") + '" style="color:' + ch + ';font-size:1.1rem;"></i></td>'
      + '<td><strong style="color:var(--txt);">' + escHtml(s.sectionName) + '</strong><br><small style="color:var(--txt-muted);">' + escHtml(s.description||"") + '</small></td>'
      + '<td><small style="color:var(--txt-muted);">' + escHtml(fn||"-") + '</small></td>'
      + '<td>' + (s.isActive?'<span class="qa-status-pill ok">ใช้งาน</span>':'<span class="qa-status-pill wait">ปิด</span>') + '</td>'
      + '<td>'
      + '<button class="qa-btn-ghost btn-sm me-1" data-sec-edit="' + escHtml(s.sectionId) + '" onclick="_secEditBtn(this)"><i class="bi bi-pencil"></i></button>'
      + '<button class="qa-btn-danger btn-sm" data-del-type="section" data-del-id="' + escHtml(s.sectionId) + '" data-del-name="' + escHtml(s.sectionName) + '" onclick="_delBtn(this)"><i class="bi bi-trash"></i></button>'
      + '</td></tr>';
  }
  c.innerHTML = '<div class="table-responsive"><table class="qa-table"><thead><tr><th>ไอคอน</th><th>ชื่อ Section</th><th>Form</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}
function _secEditBtn(btn) { editSection(btn.getAttribute("data-sec-edit")); }

// ── Manager ───────────────────────────────────────────────────
function populateMgrSectionsCheckboxes(selectedIds) { buildSectionChips("mgr-sections-checkboxes", selectedIds||[]); }

// ── ตอนติ๊กเลือกตำแหน่ง (หน้าเพิ่ม) ──
function toggleAdminPermission() {
  var cbs = Array.from(document.querySelectorAll('input[name="admin_positions"]:checked')).map(function(x){return x.value;});
  var isMgr = cbs.includes("ผู้บริหาร"); 
  
  document.getElementById("admin-perm-container").style.display = isMgr ? "block" : "none";
  // ✅ ถ้าเป็น Manager ให้แสดง Department | ถ้าเป็น User ให้แสดง Section
  document.getElementById("mgr-dept-container").style.display = isMgr ? "block" : "none"; 
  document.getElementById("mgr-sec-container").style.display  = isMgr ? "none" : "block"; 
}
// ── ตอนติ๊กเลือกตำแหน่ง (ใน Modal แก้ไข) ──
function toggleEditModalPermission() {
  var cbs = Array.from(document.querySelectorAll('input[name="edit_positions"]:checked')).map(function(x){return x.value;});
  var isMgr = cbs.includes("ผู้บริหาร");
  
  document.getElementById("edit-user-perm-container").style.display = isMgr ? "block" : "none";
  document.getElementById("edit-dept-container").style.display = isMgr ? "block" : "none"; 
  document.getElementById("edit-sec-container").style.display  = isMgr ? "none" : "block"; 
}
// ── ตอนกดบันทึกเพิ่มบุคลากร ──
function handleSavePersonnel(event) {
  event.preventDefault();
  var btn = event.target.querySelector('button[type="submit"]');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span> กำลังบันทึก...'; }
  
  var positions = Array.from(document.querySelectorAll('input[name="admin_positions"]:checked')).map(function(x){return x.value;});
  if(positions.length === 0) { showToast("กรุณาเลือกตำแหน่งงานอย่างน้อย 1 ตำแหน่ง", "warning"); if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-person-plus-fill me-1"></i>บันทึกข้อมูลบุคลากร';} return; }

  var isMgr = positions.includes("ผู้บริหาร");
  // ✅ ดึงค่าให้ตรงกับบทบาท
  var sectionsToSave = isMgr ? getSelectedChips("mgr-dept-checkboxes") : getSelectedChips("mgr-sections-checkboxes"); 
  
  var data = { 
      email:(document.getElementById("mgr-email").value||"").trim(), prefix:document.getElementById("mgr-prefix").value||"นาย", 
      fname:(document.getElementById("mgr-fname").value||"").trim(), lname:(document.getElementById("mgr-lname").value||"").trim(), 
      phone:(document.getElementById("mgr-phone").value||"").trim(), 
      sections: sectionsToSave, positions: positions, permission: document.getElementById("mgr-permission").value || "view" 
  };
  
  google.script.run
    .withSuccessHandler(function(res) { if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-person-plus-fill me-1"></i>บันทึกข้อมูลบุคลากร';} if (res&&res.success) { showToast(res.message,"success"); loadAllUsers(); event.target.reset(); toggleAdminPermission(); } else showToast((res&&res.message)||"เกิดข้อผิดพลาด","danger"); })
    .withFailureHandler(function(err) { if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-person-plus-fill me-1"></i>บันทึกข้อมูลบุคลากร';} showToast(err.message||err,"danger"); })
    .savePersonnel(data);
}


function renderUsersTable(data) {
  var c = document.getElementById("users-table-area"); if (!c) return;
  var total = (data.admins||[]).length+(data.managers||[]).length+(data.users||[]).length;

// ── ตอนกดแก้ไข (เพื่อนำข้อมูลมาใส่ Modal) ──
function openEditUserSections(email, prefix, fname, lname, phone, positionsJson, sectionsJson, role, perm) {
  var sec = [], pos = [];
  try { sec = JSON.parse(sectionsJson); } catch(e) {}
  try { pos = JSON.parse(positionsJson); } catch(e) {}

  document.getElementById("edit-user-email-display").innerText = email;
  document.getElementById("edit-user-email-hidden").value = email;
  document.getElementById("edit-user-prefix").value = prefix;
  document.getElementById("edit-user-fname").value = fname;
  document.getElementById("edit-user-lname").value = lname;
  document.getElementById("edit-user-phone").value = phone;

  document.querySelectorAll('input[name="edit_positions"]').forEach(function(cb) { cb.checked = pos.includes(cb.value); });
  toggleEditModalPermission();

  // ล้างการวาดเดิมก่อนวาดใหม่
  document.getElementById("edit-user-dept-list").innerHTML = "";
  document.getElementById("edit-user-sections-list").innerHTML = "";

  var isMgr = pos.includes("ผู้บริหาร");
  if (isMgr) {
      document.getElementById("edit-user-permission").value = perm || "view";
      buildDeptChips("edit-user-dept-list", sec); // ✅ Manager ให้วาดกล่องฝ่าย
  } else {
      buildSectionChips("edit-user-sections-list", sec); // ✅ User ให้วาดกล่องงานย่อย
  }
  new bootstrap.Modal(document.getElementById("modal-edit-user-sections")).show();
}


// ── ตอนกดปุ่มบันทึกการแก้ไขใน Modal ──
function saveEditUserSections() {
  var btn = document.querySelector('[onclick="saveEditUserSections()"]');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span> กำลังบันทึก...'; }
  
  var positions = Array.from(document.querySelectorAll('input[name="edit_positions"]:checked')).map(function(x){return x.value;});
  var isMgr = positions.includes("ผู้บริหาร");
  
  // ✅ ดึงค่าให้ตรงกับบทบาท
  var sectionsToSave = isMgr ? getSelectedChips("edit-user-dept-list") : getSelectedChips("edit-user-sections-list"); 
  
  var data = { 
    email: document.getElementById("edit-user-email-hidden").value,
    prefix: document.getElementById("edit-user-prefix").value,
    fname: document.getElementById("edit-user-fname").value,
    lname: document.getElementById("edit-user-lname").value,
    phone: document.getElementById("edit-user-phone").value,
    sections: sectionsToSave, 
    positions: positions, 
    permission: document.getElementById("edit-user-permission").value 
  };
  
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled=false; btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึกการแก้ไข'; }
      if (res&&res.success) { showToast("บันทึกสำเร็จ","success"); var mi=bootstrap.Modal.getInstance(document.getElementById("modal-edit-user-sections")); if(mi)mi.hide(); loadAllUsers(); }
      else showToast((res&&res.message)||"เกิดข้อผิดพลาด","danger");
    })
    .withFailureHandler(function(err) { if (btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-save-fill me-1"></i>บันทึกการแก้ไข';} showToast(err.message||err,"danger"); })
    .savePersonnel(data);
}

function loadAllUsers() {
  // แสดงจาก cache ทันทีถ้ามี เพื่อลด lag

function openDeleteConfirm(type, id, name) {
  APP.pendingDelete = {type:type, id:id, name:name};

  document.getElementById("del-target-id").innerText   = id;
  document.getElementById("del-confirm-email").value   = "";
  var err = document.getElementById("del-email-error"); if (err) err.style.display = "none";

  _setConfirmModalMode("delete");

/**
 * ✅ เปิด Confirm Modal สำหรับ Action ที่ไม่ใช่การลบ (เช่น เปลี่ยนชื่อ)
 * ใช้ Modal เดิม แต่ปรับ Title / Alert Text / Button Text ให้เหมาะสม
 * @param {string} type     - ประเภท Action เช่น "report-form-rename"
 * @param {string} id       - ID ของ Target
 * @param {string} name     - ชื่อที่แสดงใน Modal (หรือ ค่าที่ต้องการส่งไป Backend)
 * @param {string} modalTitle - ข้อความหัว Modal
 * @param {string} alertText  - ข้อความแจ้งเตือนใน Modal
 * @param {string} btnText    - ข้อความบนปุ่มยืนยัน
 */
function openConfirmAction(type, id, name, modalTitle, alertText, btnText) {
  APP.pendingDelete = {type:type, id:id, name:name};
  document.getElementById("del-target-name").innerText = name;
  document.getElementById("del-target-id").innerText   = id;
  document.getElementById("del-confirm-email").value   = "";
  var err = document.getElementById("del-email-error"); if (err) err.style.display = "none";

  // ปรับ Modal ให้แสดงข้อความตาม Action ที่กำลังทำ
  _setConfirmModalMode("action", modalTitle, alertText, btnText);
  new bootstrap.Modal(document.getElementById("modal-delete-confirm")).show();
}

/**
 * ✅ Helper: ปรับ UI ของ Confirm Modal ระหว่าง "delete" กับ "action" mode
 */
function _setConfirmModalMode(mode, title, alertText, btnText) {
  var iconEl  = document.getElementById("del-modal-icon");
  var titleEl = document.getElementById("del-modal-title");
  var alertEl = document.getElementById("del-modal-alert");
  var alertTx = document.getElementById("del-modal-alert-text");
  var btnTx   = document.getElementById("del-modal-btn-text");
  var btn     = document.getElementById("btn-confirm-delete");

  if (mode === "delete") {
    // โหมดลบ: สีแดง ไอคอนถัง
    if (iconEl)  iconEl.innerHTML  = '<i class="bi bi-trash-fill"></i>';
    if (iconEl)  iconEl.className  = "qa-modal-icon danger mx-auto";
    if (titleEl) titleEl.style.color = "var(--danger, #dc3545)";
    if (titleEl) titleEl.innerText   = "ยืนยันการลบ";
    if (alertEl) alertEl.className   = "qa-alert qa-alert-danger mb-3";
    if (alertTx) alertTx.innerText   = "การลบไม่สามารถกู้คืนได้ — พิมพ์อีเมล Admin เพื่อยืนยัน";
    if (btnTx)   btnTx.innerText     = "ยืนยันลบ";
    if (btn)     btn.className       = "qa-btn-danger flex-fill";
  } else {
    // โหมด Action อื่น: สีน้ำเงิน ไอคอนดินสอ
    if (iconEl)  iconEl.innerHTML  = '<i class="bi bi-pencil-fill"></i>';
    if (iconEl)  iconEl.className  = "qa-modal-icon primary mx-auto";
    if (titleEl) titleEl.style.color = "var(--primary, #2563eb)";
    if (titleEl) titleEl.innerText   = title   || "ยืนยันการดำเนินการ";
    if (alertEl) alertEl.className   = "qa-alert qa-alert-info mb-3";
    if (alertTx) alertTx.innerText   = alertText || "พิมพ์อีเมล Admin ของคุณเพื่อยืนยัน";
    if (btnTx)   btnTx.innerText     = btnText   || "ยืนยัน";
    if (btn)     btn.className       = "qa-btn-primary flex-fill";
  }
}

function executeDelete() {
  var input = (document.getElementById("del-confirm-email").value||"").trim().toLowerCase();
  var admin = ((APP.user&&APP.user.email)||"").toLowerCase();
  var errEl = document.getElementById("del-email-error");
  if (input!==admin) { if(errEl)errEl.style.display="block"; showToast("อีเมลไม่ตรงกัน","warning"); return; }
  if (errEl) errEl.style.display = "none";
  
  var btn = document.getElementById("btn-confirm-delete");
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm me-1"></span> กำลังลบ...'; }
  
  var mi = bootstrap.Modal.getInstance(document.getElementById("modal-delete-confirm")); if(mi)mi.hide();
  var pd = APP.pendingDelete||{}; APP.pendingDelete = null;
  var type=pd.type, id=pd.id, name=pd.name;
  
  function reset() { if(btn){btn.disabled=false;btn.innerHTML='<i class="bi bi-trash-fill me-1"></i>ยืนยันลบ';} }
  
  if (type==="section") {
    google.script.run.withSuccessHandler(function(res){ reset(); if(res&&res.success){showToast('ลบ "'+name+'" สำเร็จ',"success");refreshAllData(function(){renderSectionList();renderAdminDashboard();renderPublicDashboard();});}else showToast((res&&res.message)||"ลบไม่สำเร็จ","danger"); }).withFailureHandler(function(err){reset();showToast(err.message||err,"danger");}).deleteSection(id);
  } else if (type==="form") {
    google.script.run.withSuccessHandler(function(res){ reset(); if(res&&res.success){showToast('ลบ "'+name+'" สำเร็จ',"success");refreshAllData(function(){renderFormList();});}else showToast((res&&res.message)||"ลบไม่สำเร็จ","danger"); }).withFailureHandler(function(err){reset();showToast(err.message||err,"danger");}).deleteForm(id);
  } else if (type==="user-manager"||type==="user-user") {
    var utype = type==="user-manager"?"manager":"user";
    google.script.run.withSuccessHandler(function(res){ reset(); if(res&&res.success){showToast('ลบบัญชี "'+name+'" สำเร็จ',"success");loadAllUsers();}else showToast((res&&res.message)||"ลบไม่สำเร็จ","danger"); }).withFailureHandler(function(err){reset();showToast(err.message||err,"danger");}).deleteUser(utype,id);
  } else if (type==="dept") {
    google.script.run.withSuccessHandler(function(res){ reset(); if(res&&res.success){showToast('ลบฝ่าย "'+name+'" สำเร็จ',"success");refreshAllData(function(){renderDepartmentList();});}else showToast((res&&res.message)||"ลบไม่สำเร็จ","danger"); }).withFailureHandler(function(err){reset();showToast(err.message||err,"danger");}).deleteDepartment(id);
  // ── Task 1: ลบ IQA Schema Elements ────────────────────────
  } else if (type==="iqa-phase") {
    // id = phaseIdx (number string)
    var phiDel = parseInt(id, 10);
    if (!isNaN(phiDel) && APP.iqaSchema && APP.iqaSchema.phases) {
      APP.iqaSchema.phases.splice(phiDel, 1);
      _iqaBuilderActivePhaseIdx = Math.max(0, phiDel - 1);
      _iqaBuilderRender();
      iqaSaveSchema();
    }
    reset();
  } else if (type==="iqa-page") {
    // id = "phaseIdx:pageIdx"
    var parts = id.split(":");
    var phiP = parseInt(parts[0],10); var pgiP = parseInt(parts[1],10);
    if (APP.iqaSchema && APP.iqaSchema.phases && APP.iqaSchema.phases[phiP]) {
      APP.iqaSchema.phases[phiP].pages.splice(pgiP, 1);
      _iqaBuilderRender();
      iqaSaveSchema();
    }
    reset();

  // ──────────────────────────────────────────────────────────────
  // ✅ ประเภทใหม่: ลบแบบฟอร์มรายงาน (Report Form Delete)
  // ──────────────────────────────────────────────────────────────
  } else if (type==="report-form") {
    google.script.run
      .withSuccessHandler(function(res) {
        reset();
        if (res && res.success) {
          showToast('ลบ "'+name+'" สำเร็จ', "success");
          // อัปเดต State และ Render ใหม่ทั้ง Admin และ Public
          refreshAllData(function() {
            renderReportFormAdminSection();
            renderReportFormsPublic();
          });
        } else {
          showToast((res && res.message) || "ลบไม่สำเร็จ", "danger");
        }
      })
      .withFailureHandler(function(err) {
        reset();
        showToast(err.message || err, "danger");
      })
      .deleteReportForm(id); // id = fileId ใน Drive

  // ──────────────────────────────────────────────────────────────
  // ✅ ประเภทใหม่: เปลี่ยนชื่อแบบฟอร์มรายงาน (Report Form Rename)
  // id = fileId, name = ชื่อใหม่ที่ต้องการบันทึก
  // ──────────────────────────────────────────────────────────────
  } else if (type==="report-form-rename") {
    google.script.run
      .withSuccessHandler(function(res) {
        reset();
        if (res && res.success) {
          showToast("เปลี่ยนชื่อสำเร็จ", "success");
          refreshAllData(function() {
            renderReportFormAdminSection();
            renderReportFormsPublic();
          });
        } else {
          showToast((res && res.message) || "เปลี่ยนชื่อไม่สำเร็จ", "danger");
        }
      })
      .withFailureHandler(function(err) {
        reset();
        showToast(err.message || err, "danger");
      })
      .renameReportForm(id, name); // id = fileId, name = ชื่อใหม่
  }
}

// ✅ REPORT FORM ADMIN MANAGEMENT
// จัดการแบบฟอร์มรายงานฝั่ง Admin: Upload / Group / Order / Rename / Delete
// ══════════════════════════════════════════════════════════════

/**
 * แสดงส่วนจัดการแบบฟอร์มรายงานฝั่ง Admin
 * ประกอบด้วย:
 * 1. Panel จัดการกลุ่ม (เพิ่ม/เรียง/ลบกลุ่ม)
 * 2. ตารางไฟล์ทั้งหมด พร้อม dropdown เลือกกลุ่ม และปุ่มเรียงลำดับ
 */
function renderReportFormAdminSection() {
  var el = document.getElementById("report-form-admin-list");
  if (!el) return;

  var forms  = APP.reportForms      || [];
  var groups = APP.reportFormGroups || [];
  var order  = APP.reportFormOrder  || {};

  // สร้าง lookup: fileId → file object
  var fileMap = {};
  forms.forEach(function(f) { fileMap[f.fileId] = f; });

  // สร้าง lookup: fileId → groupName ปัจจุบัน
  var fileGroupMap = {};
  Object.keys(order).forEach(function(gKey) {
    (order[gKey] || []).forEach(function(fid) { fileGroupMap[fid] = gKey; });
  });
  // ไฟล์ที่ไม่อยู่ใน order ใดเลย → ถือว่า ungrouped
  forms.forEach(function(f) {
    if (fileGroupMap[f.fileId] === undefined) fileGroupMap[f.fileId] = "";
  });

  // ── Panel จัดการกลุ่ม ────────────────────────────────────
  var groupPanelHtml = '<div style="background:var(--glass-bg);border:1.5px solid var(--border-2);border-radius:12px;padding:16px 20px;" class="mb-4">'
    + '<div class="d-flex align-items-center gap-2 mb-3">'
      + '<i class="bi bi-collection-fill" style="color:var(--primary);font-size:1.1rem;"></i>'
      + '<h6 style="margin:0;font-weight:700;font-size:.9rem;">จัดการกลุ่ม</h6>'
      + '<span style="background:var(--primary);color:white;font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:20px;">' + groups.length + ' กลุ่ม</span>'
    + '</div>'
    // แถวเพิ่มกลุ่มใหม่
    + '<div class="d-flex gap-2 mb-3">'
      + '<input type="text" class="qa-input" id="rf-new-group-name" placeholder="ชื่อกลุ่มใหม่ เช่น งานบุคลากร" style="flex:1;font-size:.88rem;">'
      + '<button class="qa-btn-primary" onclick="_rfAddGroup()" style="white-space:nowrap;font-size:.85rem;"><i class="bi bi-plus-lg me-1"></i>เพิ่มกลุ่ม</button>'
    + '</div>';

  if (!groups.length) {
    groupPanelHtml += '<div class="qa-alert qa-alert-info" style="margin:0;"><i class="bi bi-info-circle-fill"></i><span>ยังไม่มีกลุ่ม — ไฟล์ทั้งหมดจะแสดงเป็นรายการเดียวกัน</span></div>';
  } else {
    // ตารางรายชื่อกลุ่ม
    var gRows = "";
    groups.forEach(function(gName, idx) {
      var cnt = (order[gName] || []).filter(function(id) { return !!fileMap[id]; }).length;
      gRows += '<tr>'
        + '<td style="font-size:.8rem;color:var(--txt-muted);text-align:center;width:28px;">' + (idx + 1) + '</td>'
        + '<td><span style="font-weight:700;font-size:.88rem;">' + escHtml(gName) + '</span></td>'
        + '<td style="text-align:center;"><span class="badge" style="background:rgba(37,99,235,.15);color:#2563eb;font-size:.78rem;">' + cnt + ' ไฟล์</span></td>'
        + '<td style="text-align:center;white-space:nowrap;">'
          + '<button class="qa-btn-ghost btn-sm" data-rf-group="' + escHtml(gName) + '" data-rf-dir="up" onclick="_rfMoveGroup(this)" title="เลื่อนขึ้น"' + (idx === 0 ? ' disabled' : '') + '><i class="bi bi-arrow-up"></i></button>'
          + '<button class="qa-btn-ghost btn-sm ms-1" data-rf-group="' + escHtml(gName) + '" data-rf-dir="down" onclick="_rfMoveGroup(this)" title="เลื่อนลง"' + (idx === groups.length - 1 ? ' disabled' : '') + '><i class="bi bi-arrow-down"></i></button>'
        + '</td>'
        + '<td style="text-align:center;">'
          + '<button class="qa-btn-ghost btn-sm text-danger" data-rf-group="' + escHtml(gName) + '" onclick="_rfDeleteGroup(this)" title="ลบกลุ่ม (ย้ายไฟล์ไปไม่จัดกลุ่ม)"><i class="bi bi-x-lg"></i></button>'
        + '</td>'
        + '</tr>';
    });
    groupPanelHtml += '<div class="table-responsive"><table class="qa-table" style="margin:0;">'
      + '<thead><tr>'
        + '<th style="width:28px;">#</th><th>ชื่อกลุ่ม</th><th style="text-align:center;">จำนวนไฟล์</th>'
        + '<th style="text-align:center;">ลำดับ</th><th style="text-align:center;">ลบ</th>'
      + '</tr></thead>'
      + '<tbody>' + gRows + '</tbody></table></div>';
  }
  groupPanelHtml += '</div>';

  // ── กรณีไม่มีไฟล์ ─────────────────────────────────────────
  if (!forms.length) {
    el.innerHTML = groupPanelHtml
      + '<div class="qa-alert qa-alert-info"><i class="bi bi-info-circle-fill"></i><span>ยังไม่มีแบบฟอร์มรายงาน — เริ่มต้นโดยอัปโหลดไฟล์ด้านบน</span></div>';
    return;
  }

  // ── เรียงไฟล์ตาม order ────────────────────────────────────
  // วนกลุ่มตามลำดับ → ตามด้วย ungrouped (key="") → ตามด้วยไฟล์ที่ไม่อยู่ใน order เลย
  var orderedFileIds = [];
  var groupOfFile    = {};  // fileId → groupName ที่ใช้ render ปุ่ม ↑↓

  groups.forEach(function(gName) {
    (order[gName] || []).forEach(function(fid) {
      if (fileMap[fid] && groupOfFile[fid] === undefined) {
        orderedFileIds.push(fid);
        groupOfFile[fid] = gName;
      }
    });
  });
  (order[""] || []).forEach(function(fid) {
    if (fileMap[fid] && groupOfFile[fid] === undefined) {
      orderedFileIds.push(fid);
      groupOfFile[fid] = "";
    }
  });
  forms.forEach(function(f) {
    if (groupOfFile[f.fileId] === undefined) {
      orderedFileIds.push(f.fileId);
      groupOfFile[f.fileId] = "";
    }
  });

  // ── สร้าง HTML ตารางไฟล์ ──────────────────────────────────
  // group options สำหรับ dropdown (เหมือนกันทุกแถว)
  var baseGroupOpts = '<option value="">-- ไม่จัดกลุ่ม --</option>'
    + groups.map(function(g) {
        return '<option value="' + escHtml(g) + '">' + escHtml(g) + '</option>';
      }).join('');

  var rows = "";
  orderedFileIds.forEach(function(fid) {
    var f = fileMap[fid];
    if (!f) return;
    var ext      = f.fileName ? f.fileName.split(".").pop().toUpperCase() : "FILE";
    var _ico     = (typeof _getFileIcon === "function") ? _getFileIcon(ext) : { icon: "bi-file-earmark-word-fill", color: "#2563eb", bg: "rgba(37,99,235,.12)" };
    var curGroup = groupOfFile[fid] !== undefined ? groupOfFile[fid] : "";
    var groupArr = order[curGroup] || [];
    var posInGroup = groupArr.indexOf(fid);
    var isFirst  = posInGroup <= 0;
    var isLast   = posInGroup < 0 || posInGroup >= groupArr.length - 1;

    // สร้าง options โดยทำ selected ให้ถูกต้อง
    var selOpts = baseGroupOpts.replace(
      'value="' + escHtml(curGroup) + '"',
      'value="' + escHtml(curGroup) + '" selected'
    );

    rows += '<tr>'
      + '<td>'
          + '<div style="display:flex;align-items:center;gap:10px;">'
            + '<i class="bi ' + _ico.icon + '" style="font-size:1.4rem;color:' + _ico.color + ';flex-shrink:0;"></i>'
            + '<div>'
              + '<div style="font-weight:700;font-size:.88rem;">' + escHtml(f.docName) + '</div>'
              + '<div style="font-size:.75rem;color:var(--txt-muted);">' + escHtml(f.fileName) + '</div>'
            + '</div>'
          + '</div>'
      + '</td>'
      + '<td style="text-align:center;">'
          + '<span style="background:' + _ico.bg + ';color:' + _ico.color + ';font-size:.73rem;font-weight:700;padding:3px 10px;border-radius:20px;">' + escHtml(ext) + '</span>'
      + '</td>'
      // Dropdown เลือกกลุ่ม
      + '<td style="min-width:160px;">'
          + '<select class="qa-input" style="font-size:.82rem;padding:4px 8px;" data-rf-file-id="' + escHtml(f.fileId) + '" onchange="_rfGroupChange(this)">'
          + selOpts
          + '</select>'
      + '</td>'
      // ปุ่มเรียงลำดับภายในกลุ่ม
      + '<td style="text-align:center;white-space:nowrap;">'
          + '<button class="qa-btn-ghost btn-sm" data-rf-file-id="' + escHtml(f.fileId) + '" data-rf-group="' + escHtml(curGroup) + '" data-rf-dir="up" onclick="_rfMoveFile(this)" title="เลื่อนขึ้น"' + (isFirst ? ' disabled' : '') + '><i class="bi bi-arrow-up"></i></button>'
          + '<button class="qa-btn-ghost btn-sm ms-1" data-rf-file-id="' + escHtml(f.fileId) + '" data-rf-group="' + escHtml(curGroup) + '" data-rf-dir="down" onclick="_rfMoveFile(this)" title="เลื่อนลง"' + (isLast ? ' disabled' : '') + '><i class="bi bi-arrow-down"></i></button>'
      + '</td>'
      // ปุ่มแก้ไข / ลบ
      + '<td style="text-align:center;white-space:nowrap;">'
          + '<button class="qa-btn-ghost btn-sm me-1" data-rf-id="' + escHtml(f.fileId) + '" data-rf-name="' + escHtml(f.docName) + '" onclick="_openRenameReportForm(this)" title="แก้ไขชื่อ"><i class="bi bi-pencil-fill"></i></button>'
          + '<button class="qa-btn-ghost btn-sm text-danger" data-del-type="report-form" data-del-id="' + escHtml(f.fileId) + '" data-del-name="' + escHtml(f.docName) + '" onclick="_delBtn(this)" title="ลบ"><i class="bi bi-trash-fill"></i></button>'
      + '</td>'
      + '</tr>';
  });

  el.innerHTML = groupPanelHtml
    + '<div class="table-responsive">'
    + '<table class="qa-table" style="margin:0;">'
      + '<thead><tr>'
        + '<th>ชื่อเอกสาร</th>'
        + '<th style="text-align:center;">ประเภท</th>'
        + '<th style="min-width:160px;">กลุ่ม</th>'
        + '<th style="text-align:center;">ลำดับในกลุ่ม</th>'
        + '<th style="text-align:center;">จัดการ</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';
}

// ── Group Management Helpers ─────────────────────────────────

/**
 * เพิ่มกลุ่มใหม่: อ่านค่า Input → validate → optimistic save
 */
function _rfAddGroup() {
  var inp  = document.getElementById("rf-new-group-name");
  if (!inp) return;
  var name = (inp.value || "").trim();
  if (!name) { showToast("กรุณาระบุชื่อกลุ่ม", "warning"); return; }

  var groups = (APP.reportFormGroups || []).slice();
  var order  = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  if (groups.indexOf(name) >= 0) { showToast('มีกลุ่ม "' + name + '" อยู่แล้ว', "warning"); return; }
  groups.push(name);
  if (!Array.isArray(order[name])) order[name] = [];

  inp.value = "";
  _saveRfConfig(groups, order, function() {
    showToast('เพิ่มกลุ่ม "' + name + '" สำเร็จ', "success");
  });
}

/**
 * ลบกลุ่ม: ย้ายไฟล์ในกลุ่มไปอยู่ใน "ไม่จัดกลุ่ม" แล้วลบกลุ่มออก
 */
function _rfDeleteGroup(btn) {
  var gName  = btn.getAttribute("data-rf-group");
  var groups = (APP.reportFormGroups || []).slice();
  var order  = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  // ย้ายไฟล์จากกลุ่มที่ลบไปอยู่ใน ungrouped
  var filesInGroup = order[gName] || [];
  if (!Array.isArray(order[""])) order[""] = [];
  order[""] = order[""].concat(filesInGroup);

  // ลบกลุ่มออกจาก array และ order object
  groups = groups.filter(function(g) { return g !== gName; });
  delete order[gName];

  _saveRfConfig(groups, order, function() {
    showToast('ลบกลุ่ม "' + gName + '" สำเร็จ (ไฟล์ย้ายไปไม่จัดกลุ่ม)', "success");
  });
}

/**
 * เลื่อนกลุ่มขึ้น/ลงในลำดับ (swap adjacent)
 */
function _rfMoveGroup(btn) {
  var gName  = btn.getAttribute("data-rf-group");
  var dir    = btn.getAttribute("data-rf-dir"); // "up" หรือ "down"
  var groups = (APP.reportFormGroups || []).slice();
  var order  = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  var idx     = groups.indexOf(gName);
  if (idx < 0) return;
  var swapIdx = dir === "up" ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= groups.length) return;

  // swap positions ใน groups array
  var tmp = groups[idx]; groups[idx] = groups[swapIdx]; groups[swapIdx] = tmp;
  _saveRfConfig(groups, order);
}

/**
 * เปลี่ยนกลุ่มของไฟล์ (เมื่อ Admin เปลี่ยน dropdown)
 */
function _rfGroupChange(sel) {
  var fileId   = sel.getAttribute("data-rf-file-id");
  var newGroup = sel.value; // "" = ungrouped
  var groups   = (APP.reportFormGroups || []).slice();
  var order    = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  // ลบ fileId ออกจากทุกกลุ่ม (ป้องกันซ้ำ)
  Object.keys(order).forEach(function(gKey) {
    if (Array.isArray(order[gKey])) {
      order[gKey] = order[gKey].filter(function(id) { return id !== fileId; });
    }
  });

  // เพิ่มเข้ากลุ่มใหม่ที่ท้ายสุด
  if (!Array.isArray(order[newGroup])) order[newGroup] = [];
  order[newGroup].push(fileId);

  _saveRfConfig(groups, order);
}

/**
 * เลื่อนไฟล์ขึ้น/ลงภายในกลุ่มเดิม (swap adjacent ใน order array)
 */
function _rfMoveFile(btn) {
  var fileId = btn.getAttribute("data-rf-file-id");
  var gName  = btn.getAttribute("data-rf-group"); // "" = ungrouped
  var dir    = btn.getAttribute("data-rf-dir");   // "up" หรือ "down"
  var groups = (APP.reportFormGroups || []).slice();
  var order  = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  var arr = order[gName] || [];
  var idx = arr.indexOf(fileId);
  if (idx < 0) return;
  var swapIdx = dir === "up" ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= arr.length) return;

  // swap positions ใน array
  var tmp = arr[idx]; arr[idx] = arr[swapIdx]; arr[swapIdx] = tmp;
  order[gName] = arr;

  _saveRfConfig(groups, order);
}

/**
 * บันทึก Config กลุ่มแบบ Optimistic Update + Rollback on failure
 * อัปเดต APP State ทันที → Re-render → ส่ง Backend → rollback ถ้าล้มเหลว
 */
function _saveRfConfig(groups, order, cb) {
  // Snapshot เก่าไว้สำหรับ rollback
  var oldGroups = (APP.reportFormGroups || []).slice();
  var oldOrder  = JSON.parse(JSON.stringify(APP.reportFormOrder || {}));

  // Optimistic update: อัปเดต State ทันที + Re-render
  APP.reportFormGroups = groups;
  APP.reportFormOrder  = order;
  renderReportFormAdminSection();

  // บันทึก Backend ผ่าน google.script.run
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        if (typeof cb === "function") cb();
      } else {
        // Rollback: กลับค่าเดิม + Re-render
        APP.reportFormGroups = oldGroups;
        APP.reportFormOrder  = oldOrder;
        renderReportFormAdminSection();
        showToast("บันทึกไม่สำเร็จ: " + (res.message || "เกิดข้อผิดพลาด"), "danger");
      }
    })
    .withFailureHandler(function(err) {
      // Rollback
      APP.reportFormGroups = oldGroups;
      APP.reportFormOrder  = oldOrder;
      renderReportFormAdminSection();
      showToast("บันทึกไม่สำเร็จ: " + (err.message || err), "danger");
    })
    .saveReportFormGroupsConfig(groups, order);
}

/**
 * เปิด Modal แก้ไขชื่อเอกสาร (ถูกเรียกจากปุ่ม Edit ในตาราง)
 * Pre-fill ชื่อเดิม แล้ว User กรอกชื่อใหม่ → กด "บันทึก" → Email Confirm

/**
 * ถูกเรียกเมื่อ Admin กดปุ่ม "บันทึก" ใน Edit Modal
 * 1. ปิด Edit Modal
 * 2. เก็บข้อมูลการเปลี่ยนชื่อไว้ใน pendingDelete
 * 3. เปิด Confirm Modal (ต้องพิมพ์อีเมล Admin)
 */
function confirmEditReportForm() {
  var fileId      = (document.getElementById("edit-report-form-fileid").value  || "").trim();
  var newDocName  = (document.getElementById("edit-report-form-docname").value || "").trim();

  if (!fileId)     { showToast("ไม่พบ ID ของแบบฟอร์ม", "warning"); return; }

  var editModal = bootstrap.Modal.getInstance(document.getElementById("modal-edit-report-form"));

  setTimeout(function() {

      "report-form-rename",      // type ที่ executeDelete() จะรองรับ

      "ยืนยันการเปลี่ยนชื่อ",    // Modal Title

      "ยืนยันเปลี่ยนชื่อ"         // Button Text
    );
  }, 300); // หน่วงเล็กน้อยเพื่อให้ Bootstrap Modal ปิดสมบูรณ์ก่อน
}

/**
 * จัดการการอัปโหลดแบบฟอร์มรายงานใหม่
 * อ่านไฟล์เป็น Base64 → ส่งไป Backend → อัปเดต State + Render ใหม่
 */
function handleReportFormUpload() {
  var docName  = (document.getElementById("report-form-doc-name").value  || "").trim();
  var fileInput = document.getElementById("report-form-file-input");
  var msgEl    = document.getElementById("report-form-upload-msg");
  var btn      = document.getElementById("btn-upload-report-form");

  // Validation
  if (!docName)  { showToast("กรุณาระบุชื่อเอกสาร", "warning");   return; }
  if (!fileInput || !fileInput.files || !fileInput.files.length) {
    showToast("กรุณาเลือกไฟล์", "warning");
    return;
  }

  var file     = fileInput.files[0];
  var fileName = file.name;
  var mimeType = file.type || "application/octet-stream";

  // แสดง Loading Spinner ระหว่างอัปโหลด
  if (btn) {
    btn.disabled    = true;
    btn.innerHTML   = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังอัปโหลด...';
  }
  if (msgEl) {
    msgEl.style.display = "block";
    msgEl.innerHTML = '<div class="qa-alert qa-alert-info">'
      + '<span class="spinner-border spinner-border-sm me-2"></span>'
      + 'กำลังอัปโหลด <strong>' + escHtml(fileName) + '</strong> ไปยัง Google Drive...'
      + '</div>';
  }

  // อ่านไฟล์เป็น Base64 ผ่าน FileReader API
  var reader = new FileReader();
  reader.onload = function(e) {
    // ตัด prefix "data:...;base64," ออก เหลือแค่ Base64 ล้วนๆ
    var base64Raw  = e.target.result;
    var base64Data = base64Raw.split(",")[1];

    // เรียก Backend ผ่าน google.script.run
    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) {
          btn.disabled  = false;
          btn.innerHTML = '<i class="bi bi-cloud-upload-fill me-1"></i>อัปโหลด';
        }
        if (res && res.success) {
          if (msgEl) {
            msgEl.innerHTML = '<div class="qa-alert qa-alert-success">'
              + '<i class="bi bi-check-circle-fill"></i>'
              + '<span>อัปโหลด <strong>' + escHtml(res.docName) + '</strong> สำเร็จ!</span>'
              + '</div>';
          }
          // รีเซ็ต Input Form
          document.getElementById("report-form-doc-name").value = "";
          fileInput.value = "";

          // อัปเดต State และ Re-render ทั้ง Admin และ Public
          refreshAllData(function() {
            renderReportFormAdminSection();
            renderReportFormsPublic();
            showToast('อัปโหลด "' + res.docName + '" สำเร็จ!', "success");
          });
        } else {
          if (msgEl) {
            msgEl.innerHTML = '<div class="qa-alert qa-alert-danger">'
              + '<i class="bi bi-x-circle-fill"></i>'
              + '<span>' + escHtml((res && res.message) || "เกิดข้อผิดพลาดในการอัปโหลด") + '</span>'
              + '</div>';
          }
        }
      })
      .withFailureHandler(function(err) {
        if (btn) {
          btn.disabled  = false;
          btn.innerHTML = '<i class="bi bi-cloud-upload-fill me-1"></i>อัปโหลด';
        }
        if (msgEl) {
          msgEl.innerHTML = '<div class="qa-alert qa-alert-danger">'
            + '<i class="bi bi-x-circle-fill"></i>'
            + '<span>' + escHtml(err.message || String(err)) + '</span>'
            + '</div>';
        }
        showToast("อัปโหลดไม่สำเร็จ: " + (err.message || err), "danger");
      })
      .uploadReportForm(base64Data, mimeType, fileName, docName);
  };

  reader.onerror = function() {
    if (btn) {
      btn.disabled  = false;
      btn.innerHTML = '<i class="bi bi-cloud-upload-fill me-1"></i>อัปโหลด';
    }
    showToast("ไม่สามารถอ่านไฟล์ได้", "danger");
  };

  // เริ่มอ่านไฟล์เป็น Data URL (Base64)
  reader.readAsDataURL(file);
}

function renderSettingsYearList() {

// ── Helper: ดาวน์โหลด CSV โดยตรงในเบราว์เซอร์ (ไม่ต้องพึ่ง Server) ──
function _downloadCsv(filename, csvContent) {
  var blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Export IQA เป็น CSV ─────────────────────────────────────
// Task 4: รวบรวม IQA mapping + ข้อมูลจริงในปีที่เลือก แล้ว export CSV
function exportIqaToCsv() {
  var yearEl = document.getElementById("admin-year-select") || document.getElementById("mgr-year-select");
  var year   = yearEl ? yearEl.value : "";
  var schema = APP.iqaSchema || { phases: [] };

  if (!schema.phases || !schema.phases.length) {
    showToast("ยังไม่มี IQA Schema — กรุณาสร้าง Schema ก่อน","warning"); return;
  }

  var rows = [["Phase","Page","Label","Form","Field","ค่าข้อมูล","สถานะ"]];

  (schema.phases || []).forEach(function(phase) {
    (phase.pages || []).forEach(function(page) {
      (page.items || []).forEach(function(item) {
        var formObj = item.formId ? (APP.forms||[]).find(function(f){return f.formId===item.formId;}) : null;
        var formName = formObj ? formObj.formName : (item.formId || "—");
        var fieldLabel = "";
        if (formObj && item.fieldKey) {
          var fld = (formObj.fields||[]).find(function(f){return f.key===item.fieldKey;});
          fieldLabel = fld ? fld.label : item.fieldKey;
        }

        // หาค่าข้อมูลจริง
        var val = "", status = "ยังไม่ Mapped";
        if (item.formId) {
          status = "Mapped";
          // หา secId
          var secId = "";
          if (formObj && formObj.sectionId) { secId = formObj.sectionId; }
          else if (formObj && item.fieldKey) {
            var fldDef = (formObj.fields||[]).find(function(ff){return ff.key===item.fieldKey;});
            if (fldDef && fldDef.sectionIds && fldDef.sectionIds.length) secId = fldDef.sectionIds[0];
            else { var fs = (APP.sections||[]).find(function(s){return s.isActive;}); if(fs) secId = fs.sectionId; }
          }
          var sub = secId && year ? (APP.dashboard||[]).find(function(d){return d.sectionId===secId&&String(d.year)===String(year);}) : null;
          if (sub) {
            var dataObj = {};
            try { dataObj = JSON.parse(sub.dataJson||"{}"); } catch(e) {}
            if (item.fieldKey) {
              val = dataObj[item.fieldKey] !== undefined ? String(dataObj[item.fieldKey]) : "";
              status = val ? "มีข้อมูล" : "Mapped / ยังไม่มีข้อมูล";
            } else {
              status = Object.keys(dataObj).length > 0 ? "มีข้อมูล (ภาพรวม Form)" : "Mapped / ยังไม่มีข้อมูล";
            }
          }
        }
        rows.push([
          phase.phaseName, page.pageName, item.label,
          formName, fieldLabel, val, status
        ]);
      });
    });
  });

  var csv = rows.map(function(r){
    return r.map(function(c){return '"'+String(c||"").replace(/"/g,'""')+'"';}).join(",");
  }).join("\r\n");

  _downloadCsv("IQA_Export_"+year+"_"+new Date().toISOString().slice(0,10)+".csv", csv);
  showToast("Export IQA เป็น CSV สำเร็จ","success");
}

    + '<p class="subtitle">ปีการศึกษา '+escHtml(year||"(ทุกปี)")+' | สร้างเมื่อ '+new Date().toLocaleDateString("th-TH")+'</p>';

  (schema.phases || []).forEach(function(phase, pi) {
    if (pi > 0) html += '<div class="page-break"></div>';
    html += '<h2>'+(pi+1)+'. '+escHtml(phase.phaseName)+'</h2>';
    (phase.pages || []).forEach(function(page) {
      html += '<h3><i>'+escHtml(page.pageName)+'</i>'+(page.route?' <small style="color:#6b7280;">('+escHtml(page.route)+')</small>':'')+'</h3>'
        + '<table><thead><tr><th>#</th><th>หัวข้อ / Label</th><th>Form ที่ Mapping</th><th>Field</th><th>ค่าข้อมูล</th><th>สถานะ</th></tr></thead><tbody>';
      (page.items || []).forEach(function(item, ii) {
        var formObj = item.formId ? (APP.forms||[]).find(function(f){return f.formId===item.formId;}) : null;
        var formName = formObj ? formObj.formName : (item.formId?"—":"ยังไม่ Mapped");
        var fieldLabel = "";
        if (formObj && item.fieldKey) {
          var fld = (formObj.fields||[]).find(function(f){return f.key===item.fieldKey;});
          fieldLabel = fld ? fld.label : item.fieldKey;
        }
        var val = "", statusClass = "chip-no", statusText = "ยังไม่ Mapped";
        if (item.formId) {
          statusClass = "chip-no"; statusText = "ไม่มีข้อมูล";
          var secId = "";
          if (formObj && formObj.sectionId) secId = formObj.sectionId;
          else if (formObj && item.fieldKey) {
            var fldDef = (formObj.fields||[]).find(function(ff){return ff.key===item.fieldKey;});
            if (fldDef && fldDef.sectionIds && fldDef.sectionIds.length) secId = fldDef.sectionIds[0];
            else { var fs = (APP.sections||[]).find(function(s){return s.isActive;}); if(fs) secId = fs.sectionId; }
          }
          var sub = secId && year ? (APP.dashboard||[]).find(function(d){return d.sectionId===secId&&String(d.year)===String(year);}) : null;
          if (sub) {
            var dObj = {}; try { dObj = JSON.parse(sub.dataJson||"{}"); } catch(e) {}
            if (item.fieldKey && dObj[item.fieldKey] !== undefined) {
              val = String(dObj[item.fieldKey]);
              statusClass = "chip-ok"; statusText = "มีข้อมูล";
            } else if (!item.fieldKey && Object.keys(dObj).length > 0) {
              statusClass = "chip-ok"; statusText = "มีข้อมูล (ภาพรวม)";
            }
          }
        }
        html += '<tr><td>'+(ii+1)+'</td><td>'+escHtml(item.label)+'</td><td>'+escHtml(formName)+'</td>'
          +'<td>'+escHtml(fieldLabel||"—")+'</td><td>'+escHtml(val||"—")+'</td>'
          +'<td class="'+statusClass+'">'+statusText+'</td></tr>';
      });
      html += '</tbody></table>';
    });
  });

  html += '</body></html>';

  var win = window.open("","_blank","width=900,height=700");
  if (!win) { showToast("กรุณาอนุญาต Pop-up ในเบราว์เซอร์","warning"); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(function(){ win.print(); }, 600);
}

function handleArchiveYear(btn) {

  if (!confirm("Archive ข้อมูลปี " + year + "?\n\nข้อมูลจะถูกย้ายออกจาก Sheet หลักไปยัง QA_BUTC_Archive_" + year + "\nการกระทำนี้ไม่สามารถย้อนกลับได้")) return;
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลัง Archive...'; }
  var r = document.getElementById("archive-year-result");
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Archive ปีนี้'; }

function runAllMaintenance(btn) {
  if (!confirm("รัน Maintenance ทั้งหมด?\n• บีบอัด tb_visits\n• ลบ Audit Log เก่ากว่า 90 วัน\n• ลบ Export Sheets เก่ากว่า 60 วัน")) return;
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังรัน...'; }
  var r = document.getElementById("run-all-result");
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-play-fill me-1"></i>รัน Maintenance ทั้งหมด'; }
      if (!r) return;
      var v = res.compressVisits || {}, a = res.pruneAudit || {}, e = res.cleanupExports || {};
      var html = '<div class="qa-alert qa-alert-success"><i class="bi bi-check-circle-fill"></i>';
      html += '<div><strong>Maintenance เสร็จสิ้น</strong><ul class="mb-0 mt-1" style="font-size:0.85rem;">';
      html += '<li>Visits: ' + escHtml(v.message || JSON.stringify(v)) + '</li>';
      html += '<li>Audit: ' + escHtml(a.message || JSON.stringify(a)) + '</li>';
      html += '<li>Exports: ' + escHtml(e.message || JSON.stringify(e)) + '</li>';
      html += '</ul></div></div>';
      r.innerHTML = html;
      loadDatabaseStats();
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-play-fill me-1"></i>รัน Maintenance ทั้งหมด'; }
      if (r) r.innerHTML = '<div class="qa-alert qa-alert-danger"><i class="bi bi-x-circle-fill"></i><span>'+escHtml(err.message||err)+'</span></div>';
    })
    .runMonthlyMaintenance();
}
