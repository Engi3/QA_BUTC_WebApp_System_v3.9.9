<style>
/* ============================================================
   css_patch.html — QA BUTC v3 Compatibility + Fixes
   1. CSS variable aliases (v2→v3 bridge)
   2. Icon/Color picker backgrounds
   3. Extra colors + icons support
   4. Admin dashboard extras
   5. IQA + Form status styles
============================================================ */

/* ── CSS Variable aliases (bridge v2 CSS vars → v3 base) ─── */
:root {
  --surface:     rgba(255,255,255,.85);
  --surface-2:   rgba(255,255,255,.72);
  --surface-3:   rgba(255,255,255,.55);
  --surface-4:   rgba(255,255,255,.38);
  --border:      rgba(0,0,0,.10);
  --border-2:    rgba(0,0,0,.06);
  --txt-3:       #475569;
  --txt-hint:    #94a3b8;
  --shadow-md:   0 4px 18px rgba(0,0,0,.10);
  --shadow-lg:   0 8px 36px rgba(0,0,0,.14);
  --glass-2:     rgba(255,255,255,.60);
  --glass-4:     rgba(255,255,255,.30);
  /* info */
  --info:        #0284c7;
  --info-l:      rgba(2,132,199,.10);
}
[data-theme="dark"] {
  --surface:     rgba(15,23,42,.90);
  --surface-2:   rgba(15,23,42,.75);
  --surface-3:   rgba(15,23,42,.60);
  --surface-4:   rgba(15,23,42,.40);
  --border:      rgba(255,255,255,.10);
  --border-2:    rgba(255,255,255,.06);
  --txt-3:       #94a3b8;
  --txt-hint:    #475569;
  --shadow-md:   0 4px 18px rgba(0,0,0,.35);
  --shadow-lg:   0 8px 36px rgba(0,0,0,.50);
  --glass-2:     rgba(15,23,42,.68);
  --glass-4:     rgba(15,23,42,.35);
  --info:        #38bdf8;
  --info-l:      rgba(56,189,248,.12);
}

/* ── Icon & Color Picker — fix transparent background ──────── */
#icon-picker-modal .bi,
#color-picker-modal .bi {
  pointer-events: none;
}

/* Icon picker button — solid bg */
#icon-picker-modal button[onclick*="selectIcon"] {
  background: #f1f5f9 !important;
  border-color: #e2e8f0 !important;
}
[data-theme="dark"] #icon-picker-modal button[onclick*="selectIcon"] {
  background: #1e293b !important;
  border-color: #334155 !important;
}

/* Color picker button — solid bg */
#color-picker-modal button[onclick*="selectColor"] {
  background: #f8fafc !important;
}
[data-theme="dark"] #color-picker-modal button[onclick*="selectColor"] {
  background: #1e293b !important;
}

/* Generic inline modals (icon/color pickers created via JS) */
div[id$="-picker-modal"] > div {
  background: #ffffff !important;
}
[data-theme="dark"] div[id$="-picker-modal"] > div {
  background: #0f172a !important;
}

/* ── Form card footer (CSS class alias) ─────────────────────── */
.qa-form-card-footer {
  padding: 13px 20px;
  background: rgba(0,0,0,.03);
  border-top: 1.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 9px;
}
[data-theme="dark"] .qa-form-card-footer { background: rgba(255,255,255,.03); }
.qa-form-card-desc {
  padding: 9px 20px;
  background: var(--info-l);
  color: var(--info);
  font-size: .82rem;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}
.qa-form-card-note {
  padding: 8px 20px;
  background: var(--warning-l);
  color: var(--warning);
  font-size: .8rem;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}
.qa-form-card-head {
  padding: 13px 20px;
  background: rgba(37,99,235,.06);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 700;
  font-size: .9rem;
}
[data-theme="dark"] .qa-form-card-head { background: rgba(59,130,246,.08); }
.qa-readonly-val {
  padding: 8px 12px;
  background: var(--surface-3);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: .88rem;
  color: var(--txt-2);
  min-height: 36px;
}

/* ── Form status bar (home page) ───────────────────────────── */
.qa-form-status-bar {
  background: var(--glass-bg);
  border: 1.5px solid var(--glass-border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 16px;
}
.qa-form-status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
  gap: 8px;
}
.qa-form-status-item {
  padding: 9px 13px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  gap: 10px;
}
.qa-form-status-name { font-size: .82rem; font-weight: 600; flex: 1; color: var(--txt); }
.qa-form-status-count { font-size: .84rem; font-weight: 700; }
.qa-form-status-pct   { font-size: .74rem; font-weight: 700; }

/* ── Section card multi-form pills ─────────────────────────── */
.qa-sec-form-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.qa-sec-form-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: .67rem; font-weight: 700;
}
.qa-sec-form-pill.done    { background: var(--success-l); color: var(--success); }
.qa-sec-form-pill.pending { background: var(--surface-3); color: var(--txt-muted); }
.qa-sec-submitter {
  display: flex; align-items: center; gap: 5px;
  font-size: .72rem; color: var(--txt-muted); flex-wrap: wrap; margin-top: 2px;
}

/* ── Admin not-user banner ──────────────────────────────────── */
#admin-not-user-msg {
  display: none;
  align-items: flex-start;
  gap: 14px;
  padding: 20px;
  background: var(--info-l);
  border: 1.5px solid var(--info);
  border-radius: var(--r);
  margin-bottom: 16px;
}

/* ── Chip grid (universal) ──────────────────────────────────── */
.qa-chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.qa-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border: 1.5px solid var(--glass-border);
  border-radius: 20px; cursor: pointer; font-size: .82rem;
  font-weight: 500; color: var(--txt-2); background: var(--glass-bg);
  transition: all var(--tr); user-select: none; font-family: inherit;
}
.qa-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-ul); }
.qa-chip.active { border-color: var(--primary); color: var(--primary); background: var(--primary-ul); font-weight: 700; }
.qa-chip.qa-chip-sm { padding: 3px 9px; font-size: .76rem; }
.qa-chip.qa-chip-form {
  padding: 9px 14px; flex-direction: column; align-items: flex-start;
  gap: 2px; border-radius: var(--r-sm); min-width: 140px;
}
.qa-chip.qa-chip-form.active { box-shadow: 0 0 0 2px var(--primary-s); }

/* ── Searchable select ──────────────────────────────────────── */
/*.qa-searchable-select-wrap { position: relative; }
.ss-opts-list {
  position: absolute; top: calc(100% + 3px); left: 0; right: 0;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r-sm); max-height: 220px; overflow-y: auto;
  z-index: 1000; box-shadow: var(--shadow-md);
}
.ss-opt { padding: 7px 12px; cursor: pointer; font-size: .84rem; color: var(--txt-2); transition: background var(--tr); }
.ss-opt:hover   { background: var(--primary-ul); color: var(--primary); }
.ss-opt.selected { background: var(--primary-ul); color: var(--primary); font-weight: 700; }
*/

/* ── Searchable select ──────────────────────────────────────── */
.qa-searchable-select-wrap { position: relative; }

.ss-opts-list {
  position: absolute; 
  top: calc(100% + 4px); 
  left: 0; 
  right: 0;
  /* ✅ บังคับใช้สีพื้นหลังทึบของระบบ (ปรับตาม Light/Dark mode อัตโนมัติ) */
  background: var(--surface) !important; 
  border: 1.5px solid var(--border) !important; 
  border-radius: var(--r-sm); 
  max-height: 220px; 
  overflow-y: auto;
  /* ✅ ดันเลเยอร์ให้อยู่หน้าสุดเสมอ จะได้ไม่มุดไปอยู่ใต้กล่องอื่น */
  z-index: 9999 !important; 
  /* ✅ เพิ่มเงาเข้มๆ ให้ลอยแยกออกจากพื้นหลังชัดเจน */
  box-shadow: var(--shadow-lg) !important; 
}

.ss-opt { 
  padding: 9px 14px; 
  cursor: pointer; 
  font-size: .86rem; 
  color: var(--txt) !important; 
  transition: background var(--tr); 
  border-bottom: 1px solid var(--border-2);
}
.ss-opt:last-child { border-bottom: none; }
.ss-opt:hover   { background: var(--primary-ul) !important; color: var(--primary) !important; }
.ss-opt.selected { background: var(--primary-ul) !important; color: var(--primary) !important; font-weight: 700; }

/* ── Logo ───────────────────────────────────────────────────── */
.qa-logo-img {
  width: 36px !important; height: 36px !important;
  border-radius: 8px !important; object-fit: contain !important;
  background: rgba(255,255,255,.15) !important;
  flex-shrink: 0 !important;
  border: 1.5px solid rgba(255,255,255,.25) !important;
  max-width: 36px !important; max-height: 36px !important;
}
.qa-logo-upload-zone {
  border: 2px dashed var(--glass-border); border-radius: var(--r);
  padding: 24px; text-align: center; cursor: pointer;
  transition: all var(--tr); background: var(--glass-bg);
}
.qa-logo-upload-zone:hover { border-color: var(--primary); background: var(--primary-ul); }
.qa-logo-preview-box {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r-sm); margin-top: 12px;
}
.qa-logo-preview-box img {
  width: 56px; height: 56px; border-radius: 10px;
  object-fit: contain; border: 1.5px solid var(--glass-border);
}

/* ── Form builder v2 ────────────────────────────────────────── */
.fb-empty { text-align: center; padding: 36px; color: var(--txt-muted); }
.fb-empty i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
.fb-field-item {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r); overflow: hidden; transition: box-shadow var(--tr);
  margin-bottom: 8px;
}
.fb-field-item:hover { box-shadow: var(--shadow-md); }
.fb-field-header {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: rgba(0,0,0,.03); border-bottom: 1px solid var(--glass-border);
}
[data-theme="dark"] .fb-field-header { background: rgba(255,255,255,.03); }
.fb-field-handle { cursor: grab; color: var(--txt-muted); font-size: 1.1rem; flex-shrink: 0; }
.fb-field-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
.fb-field-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.fb-row { display: flex; gap: 10px; flex-wrap: wrap; }
.fb-col-1, .fb-col-2 { flex: 1; min-width: 180px; }
.fb-mini-label {
  font-size: .72rem; font-weight: 700; color: var(--txt-3);
  text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; display: block;
}
.fb-sec-assign { border-top: 1px dashed var(--glass-border); padding-top: 10px; margin-top: 4px; }
.fb-items-box {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r-sm); padding: 12px;
}
.fb-items-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.fb-item-row { display: flex; align-items: center; gap: 8px; }
.fb-image-box {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r-sm); padding: 12px;
}
.fb-img-upload {
  border: 2px dashed var(--glass-border); border-radius: var(--r-sm);
  padding: 18px; text-align: center; cursor: pointer; transition: all var(--tr); margin-top: 8px;
}
.fb-img-upload:hover { border-color: var(--primary); background: var(--primary-ul); }

/* ── Theme editor gradient / color swatches ─────────────────── */
.qa-gradient-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr));
  gap: 10px; margin-top: 8px;
}
.qa-gradient-option {
  position: relative; height: 56px; border-radius: var(--r-sm);
  border: 2.5px solid transparent; cursor: pointer; transition: all var(--tr);
  display: flex; align-items: flex-end; overflow: hidden;
}
.qa-gradient-option:hover  { border-color: white; transform: scale(1.04); box-shadow: var(--shadow-md); }
.qa-gradient-option.active { border-color: white; box-shadow: 0 0 0 3px var(--primary), 0 4px 16px rgba(0,0,0,.2); transform: scale(1.06); }
.qa-gradient-label {
  width: 100%; padding: 4px 7px; font-size: .67rem; font-weight: 700;
  color: #fff; background: rgba(0,0,0,.38); text-shadow: 0 1px 3px rgba(0,0,0,.7);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.qa-gradient-check { position: absolute; top: 5px; right: 6px; color: #fff; font-size: .9rem; }
.qa-color-swatch {
  width: 30px; height: 30px; border-radius: 7px; border: 2.5px solid transparent;
  cursor: pointer; transition: all var(--tr);
}
.qa-color-swatch:hover, .qa-color-swatch.active {
  transform: scale(1.25); border-color: var(--txt); box-shadow: 0 2px 10px rgba(0,0,0,.25);
}
.qa-theme-preview-box { height: 70px; border-radius: var(--r-sm); border: 1.5px solid var(--glass-border); overflow: hidden; }

/* ── Grad builder ───────────────────────────────────────────── */
.qa-grad-builder {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--r-sm); padding: 16px; margin-top: 14px;
}
.qa-grad-builder-title {
  font-size: .75rem; font-weight: 700; color: var(--txt-3);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.qa-grad-stops { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.qa-grad-stop  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.qa-grad-stop-num { width: 20px; font-size: .75rem; font-weight: 700; color: var(--txt-muted); flex-shrink: 0; }
.qa-grad-color-btn {
  width: 38px; height: 38px; border-radius: 8px;
  border: 2px solid var(--glass-border); cursor: pointer; flex-shrink: 0;
  transition: all var(--tr); position: relative; overflow: hidden;
}
.qa-grad-color-btn:hover { border-color: var(--primary); transform: scale(1.08); }
.qa-grad-color-input { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.qa-grad-pct { width: 70px; font-size: .82rem; }
.qa-grad-direction { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.qa-grad-dir-btn {
  padding: 5px 10px; border: 1.5px solid var(--glass-border); border-radius: 6px;
  font-size: .75rem; font-weight: 700; cursor: pointer; background: var(--glass-bg);
  color: var(--txt-2); font-family: inherit; transition: all var(--tr);
}
.qa-grad-dir-btn:hover, .qa-grad-dir-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-ul); }
.qa-grad-preview { height: 44px; border-radius: var(--r-sm); border: 1.5px solid var(--glass-border); margin-bottom: 12px; }
.qa-grad-type-btns { display: flex; gap: 6px; margin-bottom: 12px; }
.qa-grad-type-btn {
  flex: 1; padding: 6px; border: 1.5px solid var(--glass-border); border-radius: 6px;
  font-size: .75rem; font-weight: 700; cursor: pointer; background: var(--glass-bg);
  color: var(--txt-2); font-family: inherit; transition: all var(--tr); text-align: center;
}
.qa-grad-type-btn:hover, .qa-grad-type-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-ul); }
.qa-theme-mode-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.qa-mode-btn {
  padding: 18px 12px; background: var(--glass-bg); border: 2px solid var(--glass-border);
  border-radius: var(--r); font-family: inherit; font-weight: 700; color: var(--txt-2);
  cursor: pointer; text-align: center; transition: all var(--tr);
}
.qa-mode-btn:hover, .qa-mode-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-ul); }

/* ── IQA pub accordion ──────────────────────────────────────── */
.qa-iqa-pub-card { background: var(--glass-bg); border: 1.5px solid var(--glass-border); border-radius: var(--r); margin-bottom: 8px; overflow: hidden; }
.qa-iqa-pub-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(0,0,0,.03); cursor: pointer; user-select: none; transition: background var(--tr); }
[data-theme="dark"] .qa-iqa-pub-head { background: rgba(255,255,255,.03); }
.qa-iqa-pub-head:hover { background: var(--primary-ul); }
.qa-iqa-pub-body { padding: 14px 16px; display: none; }
.qa-iqa-pub-body.open { display: block; animation: fadeUp .2s ease; }
.qa-iqa-field-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px dashed var(--glass-border); }
.qa-iqa-field-row:last-child { border-bottom: none; }
.qa-iqa-field-label { min-width: 160px; flex-shrink: 0; font-size: .8rem; font-weight: 600; color: var(--txt-2); padding-top: 5px; }
.qa-iqa-field-val { flex: 1; }
.qa-iqa-val-mapped  { padding: 5px 9px; background: var(--success-l); border-radius: var(--r-sm); color: var(--success); font-size: .78rem; font-weight: 600; }
.qa-iqa-val-pending { padding: 5px 9px; background: var(--warning-l); border-radius: var(--r-sm); color: var(--warning); font-size: .78rem; }
.qa-iqa-val-none    { padding: 5px 9px; background: var(--surface-3); border-radius: var(--r-sm); color: var(--txt-hint); font-size: .76rem; font-style: italic; }

/* ── IQA Admin 2-step ───────────────────────────────────────── */
.iqa-page-card  { background: var(--glass-bg); border: 1.5px solid var(--glass-border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.iqa-page-head  { display: flex; align-items: center; gap: 8px; padding: 11px 16px; background: rgba(0,0,0,.03); cursor: pointer; user-select: none; transition: background var(--tr); }
[data-theme="dark"] .iqa-page-head { background: rgba(255,255,255,.03); }
.iqa-page-head:hover { background: var(--primary-ul); }
.iqa-chevron    { transition: .2s; color: var(--txt-muted); flex-shrink: 0; font-size: .82rem; }
.iqa-phase-badge { font-size: .7rem; background: var(--info-l); color: var(--info); padding: 2px 9px; border-radius: 20px; font-weight: 700; flex-shrink: 0; }
.iqa-page-name  { font-weight: 700; font-size: .86rem; color: var(--txt); flex: 1; }
.iqa-route      { font-size: .68rem; color: var(--txt-muted); font-family: monospace; flex-shrink: 0; }
.iqa-badge-done { background: var(--success-l); color: var(--success); padding: 2px 9px; border-radius: 20px; font-size: .68rem; font-weight: 700; flex-shrink: 0; white-space: nowrap; }
.iqa-badge-empty { background: var(--surface-3); color: var(--txt-muted); padding: 2px 9px; border-radius: 20px; font-size: .68rem; flex-shrink: 0; }
.iqa-page-body  { display: none; padding: 14px 16px; border-top: 1px solid var(--glass-border); }
.iqa-url-info   { font-size: .74rem; color: var(--info); margin-bottom: 12px; padding: 5px 9px; background: var(--info-l); border-radius: var(--r-sm); }
.iqa-map-row    { padding: 10px 0; border-bottom: 1px dashed var(--glass-border); }
.iqa-map-row:last-child { border-bottom: none; }
.iqa-map-row.mapped .iqa-map-label { color: var(--success); }
.iqa-map-row.changed { background: rgba(234,179,8,.04); border-radius: var(--r-sm); padding-left: 6px; padding-right: 6px; }
.iqa-map-label  { font-size: .82rem; font-weight: 700; color: var(--txt-2); margin-bottom: 7px; }
.iqa-map-controls { display: flex; flex-direction: column; gap: 6px; }
.iqa-step       { display: flex; align-items: center; gap: 8px; }
.iqa-step-num   { width: 20px; height: 20px; border-radius: 50%; background: var(--primary); color: white; font-size: .7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.iqa-step-num-2 { background: var(--info); }
.iqa-current-badge { margin-top: 6px; padding: 4px 10px; background: var(--success-l); color: var(--success); border-radius: var(--r-sm); font-size: .77rem; font-weight: 600; display: inline-flex; align-items: center; }
.iqa-pending-dot { color: var(--warning); font-size: .88rem; }

/* ── Enhanced Table ─────────────────────────────────────────── */
.qa-enhanced-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.tbl-hd         { background: #f2f2f2; color: #333; padding: 6px 10px; font-size: .76rem; font-weight: 700; text-align: center; border: 1px solid #ddd; white-space: nowrap; }
.tbl-row-header { background: rgba(0,0,0,.04); font-weight: 700; font-size: .8rem; color: var(--txt-2); border: 1px solid var(--glass-border); padding: 5px 10px; white-space: nowrap; }
[data-theme="dark"] .tbl-row-header { background: rgba(255,255,255,.04); }
.tbl-cell       { border: 1px solid var(--glass-border); padding: 3px; }
.tbl-cell input, .tbl-cell select { width: 100%; border: none; background: transparent; font-size: .82rem; padding: 3px 6px; outline: none; color: var(--txt); }
.tbl-cell-auto  { border: 1px solid var(--glass-border); padding: 5px 9px; text-align: center; font-weight: 700; color: var(--success); font-size: .82rem; background: var(--success-l); }
