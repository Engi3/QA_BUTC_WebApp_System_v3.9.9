function saveSession() {
  try {
    if (APP.user) {
      var data = JSON.parse(JSON.stringify(APP.user));
      data.activeRole = APP.activeRole;
      localStorage.setItem("qa_session_v3", JSON.stringify(data));
    } else { localStorage.removeItem("qa_session_v3"); }
  } catch(e) {}
}
function clearSession() {
  localStorage.removeItem("qa_session_v3");
  APP.user = null; APP.activeRole = "";
}

// ── Theme system ─────────────────────────────────────────────
function initTheme() { _applyThemeMode(localStorage.getItem("qa_theme") || "light"); }
function _applyThemeMode(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  localStorage.setItem("qa_theme", mode);
  var sun  = document.getElementById("icon-sun");
  var moon = document.getElementById("icon-moon");
  if (sun)  sun.style.display  = mode === "dark" ? "none" : "block";
  if (moon) moon.style.display = mode === "dark" ? "block" : "none";
  var lm = document.getElementById("btn-light-mode");
  var dm = document.getElementById("btn-dark-mode");
  if (lm) lm.classList.toggle("active", mode === "light");
  if (dm) dm.classList.toggle("active", mode === "dark");
}
function setTheme(mode) { _applyThemeMode(mode); }
function toggleTheme() {
  var cur = document.documentElement.getAttribute("data-theme") || "light";
  _applyThemeMode(cur === "light" ? "dark" : "light");
}

function applyThemeData(t) {
  if (!t || !Object.keys(t).length) return;
  APP.selectedTheme = Object.assign({}, t);
  var root = document.documentElement;
  if (t.primary) {
    root.style.setProperty("--primary",    t.primary);
    root.style.setProperty("--primary-l",  t.primary);
    root.style.setProperty("--primary-d",  t.primary);
    root.style.setProperty("--primary-ul", t.primary + "1a");
    root.style.setProperty("--primary-s",  t.primary + "33");
  }
  if (t.gradientCss) root.style.setProperty("--hero-grad", t.gradientCss);
  _applyLogoToNavbar(t.logoUrl || "");
  try { localStorage.setItem("qa_server_theme", JSON.stringify(t)); } catch(e) {}
}
function _loadCachedTheme() {
  try { var c = localStorage.getItem("qa_server_theme"); if (c) applyThemeData(JSON.parse(c)); } catch(e) {}
}

function _applyLogoToNavbar(url) {
  var logoEl = document.getElementById("navbar-logo-img");
  var iconEl = document.getElementById("navbar-logo-icon");
  if (!logoEl || !iconEl) return;
  
  if (url) {
    logoEl.src = url;
    logoEl.style.display = "block";
    iconEl.style.display = "none";
    // ป้องกันกรณีลิงก์เสีย ให้กลับไปโชว์ไอคอนโล่
    logoEl.onerror = function() { logoEl.style.display = "none"; iconEl.style.display = "flex"; };
  } else {
    logoEl.style.display = "none";
    iconEl.style.display = "flex";
  }
  
  // ✅ อัปเดตชื่อวิทยาลัยที่ Navbar โดยเช็คข้อมูลจากฐานข้อมูลให้ชัวร์
  var navName = document.getElementById("nav-college-name");
  if(navName) {
      // ดึงจาก Theme ที่เลือก หรือ Theme หลัก ถ้าไม่มีให้ใช้ค่าเริ่มต้น
      var cName = (APP.selectedTheme && APP.selectedTheme.collegeName) || (APP.theme && APP.theme.collegeName) || "ระบบประกันคุณภาพการศึกษา";
      navName.innerText = cName;
  }
}

// ── Idle Timer ──────────────────────────────────────────────
var _idleListenerAttached = false;
function startIdleTimer() {
  var t = document.getElementById("nav-timer-container");
  if (t) t.style.display = "block";
  APP.idleTime = APP.IDLE_LIMIT;
  if (APP.idleInterval) { clearInterval(APP.idleInterval); APP.idleInterval = null; }
  APP.idleInterval = setInterval(function() {
    APP.idleTime--;
    var m = Math.floor(APP.idleTime/60), s = APP.idleTime%60;
    var d = document.getElementById("idle-timer-display");
    if (d) d.innerText = String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    var b = document.getElementById("timer-badge");
    if (b) b.classList.toggle("urgent", APP.idleTime <= 60);
    if (APP.idleTime <= 0) {
      clearInterval(APP.idleInterval); APP.idleInterval = null;
      showToast("Session หมดอายุ — กำลังออกจากระบบ...", "warning");
      setTimeout(function() { if (APP.user) logout(); }, 2000);
    }
  }, 1000);
  if (!_idleListenerAttached) {
    _idleListenerAttached = true;
    ["mousemove","keydown","scroll","click","touchstart"].forEach(function(ev) {
      document.addEventListener(ev, function() {
        if (APP.user && APP.idleInterval) APP.idleTime = APP.IDLE_LIMIT;
      }, {passive:true});
    });
  }
}
function stopIdleTimer() {
  if (APP.idleInterval) { clearInterval(APP.idleInterval); APP.idleInterval = null; }
  var t = document.getElementById("nav-timer-container"); if (t) t.style.display = "none";
}

      html += '<a class="qa-nav-btn" onclick="goToAdminDashboard()" style="cursor:pointer;"><i class="bi bi-gear-fill"></i> Admin Panel</a>';
    }
      
    if (APP.user && APP.user.role === "manager") {

      // ถ้า Manager มีสิทธิ์ "edit" ให้แสดงปุ่มกรอกข้อมูลด้วย

        html += '<a class="qa-nav-btn" onclick="goToUserForm()" style="cursor:pointer;"><i class="bi bi-pencil-square"></i> กรอกข้อมูล</a>';
      }
    }
      
    if (APP.user && (APP.user.role === "user" || APP.user.role === "admin")) {
      html += '<a class="qa-nav-btn" onclick="goToUserForm()" style="cursor:pointer;"><i class="bi bi-pencil-square"></i> กรอกข้อมูล</a>';
    }
      
    container.innerHTML = html;
  }

  var authBtn   = document.getElementById("nav-auth-btn");
  var logoutBtn = document.getElementById("nav-logout-btn");
  var userInfo  = document.getElementById("nav-user-info");
  if (APP.user) {
    if (authBtn)   authBtn.classList.add("d-none");
    if (logoutBtn) logoutBtn.classList.remove("d-none");
    if (userInfo)  userInfo.style.display = "flex";
    var profile  = APP.user.profile;
    var fullName = profile
      ? ((profile.prefix||"")+(profile.fname||"")+" "+(profile.lname||"")).trim()
      : (APP.user.fullName || APP.user.email);
    var nm = document.getElementById("nav-username-display");
    if (nm) nm.innerText = fullName;
    var rb = document.getElementById("nav-role-badge");
    if (rb) rb.innerText = ({admin:"Admin",manager:"Manager",user:"User"}[APP.user.role]) || APP.user.role;
  } else {
    if (authBtn)   authBtn.classList.remove("d-none");
    if (logoutBtn) logoutBtn.classList.add("d-none");
    if (userInfo)  userInfo.style.display = "none";
  }
  buildLinks(document.getElementById("nav-main-links"));
  buildLinks(document.getElementById("nav-mobile-links"));
}

// ── OPTIMIZED INIT ────────────────────────────────────────────
// Strategy:
// 1. Apply cached theme instantly (no flash)
// 2. Show skeleton loading state
// 3. Fire ONE server call to get everything
// 4. Render on completion
document.addEventListener("DOMContentLoaded", function() {
  // Apply theme immediately from cache (prevents flash)
  var savedTheme = localStorage.getItem("qa_theme") || "light";
  document.documentElement.setAttribute("data-theme", savedTheme);
  _applyThemeMode(savedTheme);
  _loadCachedTheme();

  updateNavbar();

  // Show loading skeleton on home
  var grid = document.getElementById("public-section-grid");
  if (grid) {
    var skeletons = "";
    for (var i = 0; i < 6; i++) {
      skeletons += '<div class="qa-sec-card" style="animation:pulse 1.4s ease-in-out infinite '+(i*0.1)+'s;">'
        + '<div style="height:40px;width:40px;border-radius:9px;background:var(--border-2);margin-bottom:10px;"></div>'
        + '<div style="height:14px;background:var(--border-2);border-radius:4px;margin-bottom:6px;width:80%;"></div>'
        + '<div style="height:10px;background:var(--border);border-radius:4px;width:50%;"></div>'
        + '</div>';
    }
    grid.innerHTML = skeletons;
  }

  // Restore user from session
  if (APP.user) { startIdleTimer(); }

  // SINGLE server round-trip for everything
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        APP.settings  = res.settings  || [];
        APP.dashboard = res.dashboard || [];
        APP.sections  = res.sections  || [];
        APP.departments = res.departments || [];
        APP.forms       = res.forms       || [];
        APP.theme       = res.theme       || {};
        APP.visits      = res.visits      || {};
        APP.iqaMapping  = res.iqaMapping  || {};
        // โหลด Dynamic IQA Schema (Task 1) — คำนวณ _iqaPages และ iqaMapping จาก schema
        if (res.iqaSchema) {
          APP.iqaSchema = res.iqaSchema;
          if (typeof _computeFromSchema === 'function') _computeFromSchema(APP.iqaSchema);
        }
        if (res.allUsers) APP.allUsersCache = res.allUsers;
        APP._dataLoaded = true;
        if (APP.theme && Object.keys(APP.theme).length) applyThemeData(APP.theme);
      }
      onDataLoaded();
    })
    .withFailureHandler(function(err) {
      showToast("โหลดข้อมูลไม่สำเร็จ: " + (err.message||err), "danger");
      onDataLoaded(); // Still render with empty state
    })
    .loadInitialData();
});

function onDataLoaded() {
  setupYearSelects();
  renderPublicDashboard();
  populateRegisterSections();
  renderDeadlineBanner();
  var vc = document.getElementById("visit-count");
  if (vc) vc.innerText = (APP.visits && APP.visits.total) || 0;
  if (APP.user && APP._dataLoaded) _routeRestore();
}

function _routeRestore() {
  if (!APP.user) return;
  if (APP.user.role === "admin") {
    _setupAdminPanel();
  } else if (APP.user.role === "manager") {
    setupManagerYearSelect(); renderManagerDashboard();
  } else if (APP.user.role === "user" || APP.activeRole === "admin_acting_as_user") {
    setupUserYearSelect(); loadUserSections();
  }
}

// ── Refresh (lightweight — only re-fetch what changed) ──────
function refreshAllData(cb) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        APP.settings    = res.settings    || [];
        APP.dashboard   = res.dashboard   || [];
        APP.sections    = res.sections    || [];
        APP.departments = res.departments || []; // ✅ รับข้อมูล Department เข้ามาเก็บไว้
        APP.forms       = res.forms       || [];
        APP.visits      = res.visits      || {};
        if (res.allUsers) APP.allUsersCache = res.allUsers;
        // อัปเดต iqaSchema หลัง refresh
        if (res.iqaSchema) {
          APP.iqaSchema = res.iqaSchema;
          if (typeof _computeFromSchema === 'function') _computeFromSchema(APP.iqaSchema);
        }
        APP._dataLoaded = true;
        if (res.theme && Object.keys(res.theme||{}).length) {
          APP.theme = res.theme;
          try { applyThemeData(res.theme); } catch(te) { console.warn("refreshAllData theme error:", te); }
          if (res.theme.iqaMapping) {
            try { APP.iqaMapping = JSON.parse(res.theme.iqaMapping); } catch(e) { APP.iqaMapping = {}; }
          }
        }
      }
      if (typeof cb === "function") cb();
    })
    .withFailureHandler(function(err) {
      showToast("รีเฟรชไม่สำเร็จ: " + (err.message||err), "danger");
      if (typeof cb === "function") cb();
    })
    .loadInitialData();
}
</script>
