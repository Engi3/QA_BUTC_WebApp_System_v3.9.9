<script>
// ============================================================
// js_render.html — Public dashboard, section cards, modals
// FIXED: removed all template literals (backticks)
// ============================================================

function renderDeadlineBanner() {
  var yearEl=document.getElementById("public-year-select"), banner=document.getElementById("deadline-banner");
  if(!banner||!yearEl||!yearEl.value||yearEl.value.indexOf("ยังไม่มี")>=0){if(banner)banner.style.display="none";return;}
  var year=yearEl.value, setting=null;
  for(var i=0;i<APP.settings.length;i++){if(String(APP.settings[i].year)===String(year)){setting=APP.settings[i];break;}}
  if(!setting){banner.style.display="none";return;}
  banner.style.display="flex";
  var now=new Date(), hasRange=setting.startDate&&setting.endDate;
  var html='<i class="bi bi-calendar-event fs-4" style="color:var(--primary);"></i><div class="d-flex flex-wrap gap-3 align-items-center">';
  html+='<div class="qa-deadline-item"><span class="fw-700" style="color:var(--txt);">ปีการศึกษา '+setting.year+'</span></div>';
  if(hasRange){
    var start=new Date(setting.startDate), end=new Date(setting.endDate);
    start.setHours(0,0,0,0); end.setHours(23,59,59,999);
    var isOpen=setting.isOpen&&now>=start&&now<=end, diff=Math.ceil((end-now)/(1000*60*60*24));
    html+='<div class="qa-deadline-item"><span class="'+(isOpen?"qa-deadline-open":"qa-deadline-closed")+'">'+(isOpen?"🟢 เปิดรับข้อมูล":"🔴 ปิดระบบ")+'</span></div>';
    html+='<div class="qa-deadline-item" style="color:var(--txt-3);">'+toThaiDate(setting.startDate)+' — '+toThaiDate(setting.endDate)+'</div>';
    if(isOpen&&diff>=0) html+='<div class="qa-deadline-item"><span class="qa-countdown '+(diff<=3?"warn":"ok")+'">'+(diff<=0?"วันสุดท้าย!":"เหลือ "+diff+" วัน")+'</span></div>';
    else if(!isOpen&&now<start) html+='<div class="qa-deadline-item"><span class="qa-countdown closed">เปิดอีก '+Math.ceil((start-now)/(1000*60*60*24))+' วัน</span></div>';
    else if(!isOpen) html+='<div class="qa-deadline-item"><span class="qa-countdown closed">หมดเวลาแล้ว</span></div>';
  } else {
    html+='<div class="qa-deadline-item"><span class="'+(setting.isOpen?"qa-deadline-open":"qa-deadline-closed")+'">'+(setting.isOpen?"🟢 เปิดรับข้อมูล":"🔴 ปิดระบบ")+'</span></div>';
  }
  banner.innerHTML=html+'</div>';
}

function renderPublicDashboard() {
  try {
    var yearEl = document.getElementById("public-year-select");
    if (!yearEl || !yearEl.value || yearEl.value.indexOf("ยังไม่มี") >= 0) return;
    
    var year = yearEl.value;
    var active = APP.sections.filter(function(s){return s.isActive;});
    var yearData = APP.dashboard.filter(function(d){return String(d.year) === String(year);});

    // คำนวณ progress จากจำนวนฟิลด์ที่กรอก (ไม่ใช่จำนวน Section ที่ส่ง)
    // totalFields = max fields ต่อ 1 section (ไม่ × จำนวน section)
    // completedFields = เฉลี่ยที่กรอกต่อ section
    var _tfSum = 0, _cfSum = 0, _maxTF = 0;
    active.forEach(function(sec) {
      var dashRow = null;
      for (var i = 0; i < yearData.length; i++) { if (yearData[i].sectionId === sec.sectionId) { dashRow = yearData[i]; break; } }
      var dataObj = {};
      if (dashRow && dashRow.dataJson) { try { dataObj = JSON.parse(dashRow.dataJson); } catch(e) {} }
      var prog = _calcFieldProgress(sec.sectionId, APP.forms, dataObj);
      _tfSum += prog.total;
      _cfSum += prog.completed;
      if (prog.total > _maxTF) _maxTF = prog.total;
    });
    var totalFields = _maxTF;
    var completedFields = active.length > 0 ? Math.round(_cfSum / active.length) : 0;
    var pct = _tfSum > 0 ? Math.round(_cfSum / _tfSum * 100) : 0;
    var sub = yearData.length;
    var total = active.length;

    var sr = document.getElementById("public-stats-row");
    if (sr) {
      sr.innerHTML =
        '<div class="qa-stat-card"><div class="qa-stat-num">' + total + '</div><div class="qa-stat-label">Section ทั้งหมด</div></div>' +
        '<div class="qa-stat-card success"><div class="qa-stat-num">' + sub + '</div><div class="qa-stat-label">ส่งข้อมูลแล้ว</div></div>' +
        '<div class="qa-stat-card warning"><div class="qa-stat-num">' + completedFields + ' / ' + totalFields + '</div><div class="qa-stat-label">ฟิลด์ที่กรอก</div></div>' +
        '<div class="qa-stat-card accent"><div class="qa-stat-num">' + pct + '%</div><div class="qa-stat-label">ความคืบหน้ารวม</div></div>' +
        '<div class="qa-stat-card info"><div class="qa-stat-num" id="visit-count">' + ((APP.visits && APP.visits.total) || 0) + '</div><div class="qa-stat-label">ผู้เข้าชมทั้งหมด</div></div>';
    }
    
    var bar = document.getElementById("public-progress-bar");
    var pctEl = document.getElementById("public-progress-pct");
    if (bar) bar.style.width = pct + "%"; 
    if (pctEl) pctEl.innerText = pct + "%";
    
    // เรียกฟังก์ชันวาดการ์ดอย่างปลอดภัย
    if (typeof buildSectionCards === 'function') {
      buildSectionCards(active, yearData, "public-section-grid", year);
    } else {
      console.error("buildSectionCards function is missing!");
      document.getElementById("public-section-grid").innerHTML = '<div class="qa-alert qa-alert-danger">ระบบขัดข้อง: ไม่พบฟังก์ชันสร้างการ์ด</div>';
    }
    
    renderDeadlineBanner();
    renderPublicFormProgress();

    // ป้องกัน IQA พัง
    try {
      var iqaPanel = document.getElementById("home-panel-iqa");
      if (iqaPanel && iqaPanel.style.display !== "none" && typeof renderIqaPublicView === 'function') {
        renderIqaPublicView();
      }
    } catch(iqaErr) {
      console.warn("IQA render skipped:", iqaErr);
    }
    
  } catch(err) {
    console.error("Error in renderPublicDashboard:", err);
  }
}

function homeSelectTab(tab) {
  var panels = { form: "home-panel-form", qa: "home-panel-qa", iqa: "home-panel-iqa", tracking: "home-panel-tracking", report: "home-panel-report" };
  var btns   = { form: "home-tab-form-btn", qa: "home-tab-qa-btn", iqa: "home-tab-iqa-btn", tracking: "home-tab-tracking-btn", report: "home-tab-report-btn" };

  Object.keys(panels).forEach(function(k) {
    var p = document.getElementById(panels[k]); if (p) p.style.display = k === tab ? "block" : "none";
    var b = document.getElementById(btns[k]);   if (b) b.className = k === tab ? "qa-tab-link active" : "qa-tab-link";
  });

  if (tab === "form")     renderPublicFormProgress();
  if (tab === "iqa" && typeof renderIqaPublicView === "function") {
    try { renderIqaPublicView(); } catch(e) {
      var c = document.getElementById("iqa-view-content");
      if (c) c.innerHTML = '<div class="qa-alert qa-alert-danger"><i class="bi bi-exclamation-triangle-fill"></i><span>เกิดข้อผิดพลาด: '+escHtml(e.message||String(e))+'</span></div>';
    }
  }
  if (tab === "tracking") renderDocTrackingPublic();
  if (tab === "report")   renderReportFormsPublic();
}

/**
 * แสดงรายการแบบฟอร์มรายงานบนหน้าสาธารณะ
 * - ถ้าไม่มีกลุ่ม: แสดงเป็นตารางเดียว (เหมือนเดิม)
 * - ถ้ามีกลุ่ม: แสดงเป็น Bootstrap Accordion พับได้ กลุ่มแรกเปิดอัตโนมัติ
 * - ไฟล์ไม่จัดกลุ่มจะแสดงที่ส่วนท้ายในหัวข้อ "ทั่วไป"
 */
function renderReportFormsPublic() {
  var el = document.getElementById("public-report-forms-container");
  if (!el) return;

  var forms  = APP.reportForms      || [];
  var groups = APP.reportFormGroups || [];
  var order  = APP.reportFormOrder  || {};

  // กรณีไม่มีแบบฟอร์มเลย
  if (!forms.length) {
    el.innerHTML = '<div class="qa-glass-card p-5 text-center">'
      + '<i class="bi bi-folder2-open" style="font-size:3rem;color:var(--txt-muted);display:block;margin-bottom:12px;"></i>'
      + '<p style="color:var(--txt-muted);font-size:.95rem;margin:0;">ยังไม่มีแบบฟอร์มรายงาน</p>'
      + '</div>';
    return;
  }

  // สร้าง lookup: fileId → file object
  var fileMap = {};
  forms.forEach(function(f) { fileMap[f.fileId] = f; });

  // ── ไอคอน+สีตามนามสกุลไฟล์ ──────────────────────────────
  function _getFileIcon(ext) {
    var e = (ext || "").toLowerCase();
    if (e === "pdf")                         return { icon: "bi-file-earmark-pdf-fill",   color: "#dc2626", bg: "rgba(220,38,38,.1)"   };
    if (e === "xls"  || e === "xlsx")        return { icon: "bi-file-earmark-excel-fill", color: "#16a34a", bg: "rgba(22,163,74,.1)"   };
    if (e === "ppt"  || e === "pptx")        return { icon: "bi-file-earmark-ppt-fill",   color: "#ea580c", bg: "rgba(234,88,12,.1)"   };
    if (e === "doc"  || e === "docx")        return { icon: "bi-file-earmark-word-fill",  color: "#2563eb", bg: "rgba(37,99,235,.12)"  };
    if (e === "csv"  || e === "txt")         return { icon: "bi-file-earmark-text-fill",  color: "#0891b2", bg: "rgba(8,145,178,.1)"   };
    if (e === "zip"  || e === "rar")         return { icon: "bi-file-earmark-zip-fill",   color: "#7c3aed", bg: "rgba(124,58,237,.1)"  };
    return                                          { icon: "bi-file-earmark-fill",        color: "#64748b", bg: "rgba(100,116,139,.1)" };
  }

  // ── สร้างแถว HTML ของไฟล์ 1 ไฟล์ ──────────────────────────
  function _fileRow(f) {
    var ext = f.fileName ? f.fileName.split(".").pop().toUpperCase() : "FILE";
    var ico = _getFileIcon(ext);
    return '<tr>'
      + '<td>'
        + '<div style="display:flex;align-items:center;gap:10px;">'
          + '<div style="width:38px;height:38px;border-radius:8px;background:' + ico.bg + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
            + '<i class="bi ' + ico.icon + '" style="font-size:1.2rem;color:' + ico.color + ';"></i>'
          + '</div>'
          + '<div>'
            + '<div style="font-weight:700;font-size:.9rem;color:var(--txt-1);">' + escHtml(f.docName) + '</div>'
            + '<div style="font-size:.76rem;color:var(--txt-muted);">' + escHtml(f.fileName) + '</div>'
          + '</div>'
        + '</div>'
      + '</td>'
      + '<td style="text-align:center;">'
        + '<span style="background:' + ico.bg + ';color:' + ico.color + ';font-size:.73rem;font-weight:700;padding:3px 10px;border-radius:20px;">' + escHtml(ext) + '</span>'
      + '</td>'
      + '<td style="text-align:center;">'
        + '<a href="' + escHtml(f.downloadUrl) + '" target="_blank" class="qa-btn-primary btn-sm me-1" style="display:inline-flex;align-items:center;gap:6px;font-size:.82rem;" title="ดาวน์โหลดไฟล์">'
          + '<i class="bi bi-download"></i>ดาวน์โหลด'
        + '</a>'
        + '<a href="' + escHtml(f.viewUrl || f.downloadUrl) + '" target="_blank" class="qa-btn-ghost btn-sm" style="display:inline-flex;align-items:center;gap:5px;font-size:.82rem;" title="ดูในGoogle Drive">'
          + '<i class="bi bi-box-arrow-up-right"></i>'
        + '</a>'
      + '</td>'
      + '</tr>';
  }

  // ── สร้างตารางจาก array ของ fileId ──────────────────────────
  function _buildTable(fileIds) {
    var rows = "";
    fileIds.forEach(function(fid) {
      var f = fileMap[fid];
      if (f) rows += _fileRow(f);
    });
    if (!rows) return '<p style="color:var(--txt-muted);font-size:.85rem;padding:8px 0;margin:0;">ไม่มีแบบฟอร์มในกลุ่มนี้</p>';
    return '<div class="table-responsive">'
      + '<table class="qa-table" style="margin:0;">'
        + '<thead><tr>'
          + '<th>ชื่อเอกสาร</th>'
          + '<th style="text-align:center;">ประเภท</th>'
          + '<th style="text-align:center;">ดาวน์โหลด</th>'
        + '</tr></thead>'
        + '<tbody>' + rows + '</tbody>'
      + '</table></div>';
  }

  // ── ถ้าไม่มีกลุ่มเลย: แสดง flat table ────────────────────
  if (!groups.length) {
    var allIds = [];
    var seen   = {};
    (order[""] || []).forEach(function(fid) {
      if (fileMap[fid] && !seen[fid]) { allIds.push(fid); seen[fid] = true; }
    });
    forms.forEach(function(f) {
      if (!seen[f.fileId]) { allIds.push(f.fileId); seen[f.fileId] = true; }
    });

    el.innerHTML = '<div class="qa-glass-card p-4">'
      + '<div class="d-flex align-items-center gap-2 mb-4">'
        + '<i class="bi bi-file-earmark-arrow-down-fill" style="font-size:1.4rem;color:var(--primary);"></i>'
        + '<h6 style="margin:0;font-weight:700;">รายการแบบฟอร์มรายงาน</h6>'
        + '<span style="background:var(--primary);color:white;font-size:.73rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:4px;">' + forms.length + '</span>'
      + '</div>'
      + _buildTable(allIds)
      + '</div>';
    return;
  }

  // ── มีกลุ่ม: แสดง Bootstrap Accordion ────────────────────
  var seenIds = {}; // ป้องกันไฟล์แสดงซ้ำ
  var accItems = "";
  var firstOpen = true; // กลุ่มแรกที่มีไฟล์จะเปิดเป็น default

  groups.forEach(function(gName, idx) {
    var fileIds = (order[gName] || []).filter(function(fid) {
      return fileMap[fid] && !seenIds[fid];
    });
    fileIds.forEach(function(fid) { seenIds[fid] = true; });

    var itemId = "rfg-" + idx;
    var isOpen = firstOpen; // กลุ่มแรกเปิดอัตโนมัติ
    if (firstOpen) firstOpen = false;

    accItems += '<div class="accordion-item" style="border:1.5px solid var(--border-2);border-radius:10px;overflow:hidden;margin-bottom:8px;">'
      + '<h2 class="accordion-header">'
        + '<button class="accordion-button' + (isOpen ? '' : ' collapsed') + '" type="button" data-bs-toggle="collapse" data-bs-target="#' + itemId + '" style="font-weight:700;font-size:.92rem;background:var(--glass-bg);color:var(--txt-1);box-shadow:none;">'
          + '<i class="bi bi-folder-fill me-2" style="color:var(--primary);"></i>'
          + escHtml(gName)
          + '<span style="background:var(--primary);color:white;font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:20px;margin-left:10px;">' + fileIds.length + '</span>'
        + '</button>'
      + '</h2>'
      + '<div id="' + itemId + '" class="accordion-collapse collapse' + (isOpen ? ' show' : '') + '">'
        + '<div class="accordion-body" style="padding:12px 16px;">'
          + _buildTable(fileIds)
        + '</div>'
      + '</div>'
      + '</div>';
  });

  // ── ungrouped: แสดงที่ส่วนท้าย (ถ้ามี) ───────────────────
  var ungroupedIds = [];
  (order[""] || []).forEach(function(fid) {
    if (fileMap[fid] && !seenIds[fid]) { ungroupedIds.push(fid); seenIds[fid] = true; }
  });
  // ไฟล์ที่ไม่อยู่ใน order เลย (migration guard)
  forms.forEach(function(f) {
    if (!seenIds[f.fileId]) { ungroupedIds.push(f.fileId); seenIds[f.fileId] = true; }
  });

  if (ungroupedIds.length) {
    var uId     = "rfg-ungrouped";
    var uIsOpen = firstOpen; // เปิดถ้าเป็น group เดียวที่แสดง
    accItems += '<div class="accordion-item" style="border:1.5px solid var(--border-2);border-radius:10px;overflow:hidden;margin-bottom:8px;">'
      + '<h2 class="accordion-header">'
        + '<button class="accordion-button' + (uIsOpen ? '' : ' collapsed') + '" type="button" data-bs-toggle="collapse" data-bs-target="#' + uId + '" style="font-weight:700;font-size:.92rem;background:var(--glass-bg);color:var(--txt-1);box-shadow:none;">'
          + '<i class="bi bi-folder2-open me-2" style="color:var(--txt-muted);"></i>'
          + 'ทั่วไป'
          + '<span style="background:var(--txt-muted);color:white;font-size:.72rem;font-weight:700;padding:1px 8px;border-radius:20px;margin-left:10px;">' + ungroupedIds.length + '</span>'
        + '</button>'
      + '</h2>'
      + '<div id="' + uId + '" class="accordion-collapse collapse' + (uIsOpen ? ' show' : '') + '">'
        + '<div class="accordion-body" style="padding:12px 16px;">'
          + _buildTable(ungroupedIds)
        + '</div>'
      + '</div>'
      + '</div>';
  }

  el.innerHTML = '<div class="qa-glass-card p-4">'
    + '<div class="d-flex align-items-center gap-2 mb-4">'
      + '<i class="bi bi-file-earmark-arrow-down-fill" style="font-size:1.4rem;color:var(--primary);"></i>'
      + '<h6 style="margin:0;font-weight:700;">รายการแบบฟอร์มรายงาน</h6>'
      + '<span style="background:var(--primary);color:white;font-size:.73rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:4px;">' + forms.length + '</span>'
    + '</div>'
    + '<div class="accordion" id="rf-public-accordion">'
      + accItems
    + '</div>'
    + '</div>';
}

function renderPublicFormProgress() {
  var yearSel = document.getElementById("public-year-select");
  var year = yearSel ? yearSel.value : "";
  _renderFormProgressGrid("public-form-progress-grid", year);
}

function _renderFormProgressGrid(containerId, year) {
  var el = document.getElementById(containerId);
  if (!el) return;
  var yearData = [];
  (APP.dashboard || []).forEach(function(r) { if (String(r.year) === String(year)) yearData.push(r); });

  var activeForms = (APP.forms || []).filter(function(f) { return f.isActive; });
  if (!activeForms.length) {
    el.innerHTML = '<div class="text-center text-muted py-4">ไม่มีแบบฟอร์ม</div>';
    return;
  }

  var activeSections = (APP.sections || []).filter(function(s) { return s.isActive; });
  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">';
  activeForms.forEach(function(form) {
    var totalPoints = 0, completedPoints = 0;
    // fieldCount ไม่นับ divider, image, toggle-group, checkbox-group, tick-grid (สอดคล้องกับ _calcFieldProgress)
    var fieldCount = (form.fields || []).filter(function(f){
      return f.type !== "divider" && f.type !== "image"
        && f.type !== "toggle-group" && f.type !== "checkbox-group" && f.type !== "tick-grid";
    }).length;
    var isShared = (typeof _isSharedForm === 'function') && _isSharedForm(form);
    var gRow = null;

    if (isShared) {
      // ฟอร์มส่วนกลาง: นับ field ครั้งเดียว อ่านจาก GLOBAL_ key
      var gKey = "GLOBAL_" + form.formId;
      for (var gi=0; gi<yearData.length; gi++) { if (yearData[gi].sectionId === gKey) { gRow = yearData[gi]; break; } }
      var gDataObj = {};
      if (gRow && gRow.dataJson) { try { gDataObj = JSON.parse(gRow.dataJson); } catch(e) {} }
      var gProg = _calcFieldProgress(gKey, [form], gDataObj);
      totalPoints    = gProg.total;
      completedPoints = gProg.completed;
    } else {
      // ฟอร์ม Section-specific: รวม progress ทุก Section
      activeSections.forEach(function(sec) {
        var dashRow = null;
        for (var i = 0; i < yearData.length; i++) {
          if (yearData[i].sectionId === sec.sectionId) { dashRow = yearData[i]; break; }
        }
        var dataObj = {};
        if (dashRow && dashRow.dataJson) { try { dataObj = JSON.parse(dashRow.dataJson); } catch(e) {} }
        var sProg = _calcFieldProgress(sec.sectionId, [form], dataObj);
        totalPoints    += sProg.total;
        completedPoints += sProg.completed;
      });
    }

    var pct = totalPoints > 0 ? Math.round(completedPoints / totalPoints * 100) : 0;
    var sColor = pct === 100 ? "var(--success)" : (pct > 0 ? "var(--warning)" : "var(--danger)");
    var subInfo = isShared ? '<span style="color:var(--info);font-weight:600;">ฟอร์มส่วนกลาง</span>' : ('เป้าหมาย ' + activeSections.length + ' Section');
    var viewBtn = (isShared && gRow)
      ? '<div class="mt-2"><button class="qa-btn-ghost w-100" style="font-size:.78rem;border:1px solid var(--border);" onclick="openViewModal(\''+escHtml("GLOBAL_"+form.formId)+'\',\''+escHtml(form.formName)+'\',\''+year+'\')">'
        + '<i class="bi bi-search me-1"></i>ดูข้อมูลที่กรอก</button></div>'
      : "";

    html += '<div class="qa-glass-card p-3">'
      + '<div style="font-weight:700;font-size:.9rem;color:var(--txt);margin-bottom:2px;"><i class="bi bi-file-earmark-text me-2" style="color:var(--primary);"></i>' + escHtml(form.formName) + '</div>'
      + '<div style="font-size:.7rem;color:var(--txt-muted);margin-bottom:8px;">' + fieldCount + ' ฟิลด์ | ' + subInfo + '</div>'
      + '<div class="progress mb-2" style="height:6px;background:var(--border-2);border-radius:3px;">'
      +   '<div class="progress-bar" style="width:' + pct + '%;background-color:' + sColor + ';"></div>'
      + '</div>'
      + '<div style="font-size:.78rem;color:var(--txt-muted);display:flex;justify-content:space-between;">'
      +   '<span>กรอกแล้ว ' + completedPoints + ' / ' + totalPoints + ' รายการ</span>'
      +   '<span style="color:' + sColor + ';font-weight:600;">' + pct + '%</span>'
      + '</div>'
      + viewBtn
      + '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function openViewModal(secId, secName, year) {
  var yr = year || (document.getElementById("public-year-select")||{}).value || "";

  // รวมข้อมูลฟอร์มส่วนกลาง (GLOBAL_ rows) + Section-specific row
  var mergedDataObj = {};
  var displaySubmitter = "-", displayUpdate = "";
  (APP.dashboard || []).forEach(function(d) {
    if (String(d.year) !== String(yr)) return;
    if (d.sectionId && d.sectionId.indexOf("GLOBAL_") === 0 && d.dataJson) {
      try { var gd = JSON.parse(d.dataJson); Object.keys(gd).forEach(function(k){ if(!(k in mergedDataObj)) mergedDataObj[k]=gd[k]; }); } catch(e) {}
      if (!displayUpdate && d.lastUpdate) { displayUpdate = d.lastUpdate; displaySubmitter = d.submitterName || "-"; }
    }
  });

  // Section-specific row (มีความสำคัญกว่า)
  var sub = null;
  for (var i=0; i<APP.dashboard.length; i++) {
    if (APP.dashboard[i].sectionId === secId && String(APP.dashboard[i].year) === String(yr)) { sub = APP.dashboard[i]; break; }
  }
  if (sub && sub.dataJson) {
    try { var sd = JSON.parse(sub.dataJson); Object.keys(sd).forEach(function(k){ mergedDataObj[k]=sd[k]; }); } catch(e) {}
    displaySubmitter = sub.submitterName || displaySubmitter;
    displayUpdate    = sub.lastUpdate    || displayUpdate;
  }

  // GLOBAL_ key โดยตรง (เรียกจาก form progress grid)
  if (!sub && secId.indexOf("GLOBAL_") === 0) {
    for (var j=0; j<APP.dashboard.length; j++) {
      if (APP.dashboard[j].sectionId === secId && String(APP.dashboard[j].year) === String(yr)) { sub = APP.dashboard[j]; break; }
    }
    if (!sub && Object.keys(mergedDataObj).length === 0) return showToast("ไม่พบข้อมูล","warning");
  }

  if (!sub && Object.keys(mergedDataObj).filter(function(k){ return !k.endsWith("__by")&&!k.endsWith("__at")&&!k.endsWith("_total_rows")&&mergedDataObj[k]!==""; }).length === 0) {
    return showToast("ไม่พบข้อมูล","warning");
  }

  document.getElementById("modal-view-title").innerHTML = '<i class="bi bi-folder-open-fill me-2"></i>'+escHtml(secName)+' (ปี '+yr+')';
  document.getElementById("modal-submitter-info").innerHTML = '<i class="bi bi-person-check-fill fs-4"></i><div>ผู้รับผิดชอบ: <strong>'+escHtml(displaySubmitter)+'</strong> | อัปเดต: '+(displayUpdate?toThaiDate(displayUpdate,true):"-")+'</div>';

  var secForms = [];
  if (secId.indexOf("GLOBAL_") === 0) {
    // ดู GLOBAL_ key → หาฟอร์มตรงๆ
    var fid = secId.replace("GLOBAL_","");
    var fObj = null;
    for (var fi=0; fi<(APP.forms||[]).length; fi++) { if (APP.forms[fi].formId === fid) { fObj = APP.forms[fi]; break; } }
    secForms = fObj ? [fObj] : [];
  } else {
    var section = null;
    for (var si=0; si<APP.sections.length; si++) { if (APP.sections[si].sectionId===secId) { section=APP.sections[si]; break; } }
    secForms = section ? getFormsForSection(section) : [];
  }

  document.getElementById("modal-view-body").innerHTML = secForms.length ? renderFormsRO(secForms, mergedDataObj) : renderRawRO(mergedDataObj);
  new bootstrap.Modal(document.getElementById("modal-view-data")).show();
}

function _extractTableRows(fieldKey, colDefs, dataObj) {
  var cols=(colDefs||"").split(",").map(function(c){return c.trim();}).filter(Boolean);
  if(!cols.length) return {cols:[], rows:[]};
  var maxR=0;
  var totalKey=fieldKey+"_total_rows";
  if(dataObj[totalKey]) maxR=parseInt(dataObj[totalKey])||0;
  if(maxR===0){
    Object.keys(dataObj).forEach(function(k){
      var base=fieldKey.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      var m=k.match(new RegExp("^"+base+"_col\\d+_(\\d+)$"));
      if(m) maxR=Math.max(maxR,parseInt(m[1])+1);
    });
  }
  var rows=[];
  for(var r=0;r<maxR;r++){
    var row=cols.map(function(_,ci){return dataObj[fieldKey+"_col"+ci+"_"+r]||"";});
    if(row.some(function(v){return v.trim()!==""})) rows.push(row);
  }
  return {cols:cols, rows:rows};
}

function _renderTableRO(label, fieldKey, colDefs, dataObj) {
  var t=_extractTableRows(fieldKey, colDefs, dataObj);
  if(!t.cols.length) return '<div class="mb-3"><div class="qa-label">'+escHtml(label)+'</div><div class="qa-readonly-val">ไม่มีคอลัมน์</div></div>';
  var thead=t.cols.map(function(c){return '<th>'+escHtml(c)+'</th>';}).join("")+'<th>-</th>';
  var tbody="";
  if(!t.rows.length){
    tbody='<tr><td colspan="'+(t.cols.length+1)+'" style="text-align:center;color:var(--txt-muted);padding:12px;">ไม่มีข้อมูล</td></tr>';
  } else {
    tbody=t.rows.map(function(row){
      return '<tr>'+row.map(function(cell){return '<td>'+escHtml(cell||"-")+'</td>';}).join("")+'<td></td></tr>';
    }).join("");
  }
  return '<div class="mb-3"><div class="qa-label">'+escHtml(label)+'</div>'
    +'<div style="overflow-x:auto;"><table class="qa-data-table"><thead><tr>'+thead+'</tr></thead><tbody>'+tbody+'</tbody></table></div></div>';
}

// ── แสดง "แก้ไขล่าสุดโดย / เวลา" ระดับฟิลด์ ──
function _fieldAuditTag(key, dataObj) {
  var by = dataObj[key + "__by"];
  var at = dataObj[key + "__at"];
  if (!by && !at) return "";
  return '<div style="font-size:0.68rem;color:var(--txt-muted);margin-top:4px;line-height:1.4;">'
    + '<i class="bi bi-pencil-fill me-1" style="font-size:0.6rem;opacity:.7;"></i>'
    + (by ? escHtml(by) : "")
    + (at ? ' &nbsp;·&nbsp; ' + toThaiDate(at, true) : '')
    + '</div>';
}

function renderFieldsRO(fields, dataObj) {
  if(!fields.length) return '<p style="color:var(--txt-muted);">ไม่มีฟิลด์</p>';
  var html="";
  var i=0;
  while(i<fields.length){
    var f=fields[i];
    // ── Divider (collapsible) ──────────────────────────────────
    if(f.type==="divider"){
      var dLbl2 = f.label || f.placeholder || "";
      if(f.collapsible){
        var roUid = "dro_"+(f.key||("i"+i))+"_"+i;
        html+='<div class="qa-divider-collapsible" onclick="_toggleDivider(\''+roUid+'\',this)">'
          +'<i class="bi bi-chevron-down qa-divider-arrow"></i>'
          +'<span class="qa-form-divider-label">'+escHtml(dLbl2||"ส่วน")+'</span>'
          +'</div>'
          +'<div id="'+roUid+'" class="qa-divider-body">';
        i++;
        while(i<fields.length && fields[i].type!=="divider"){
          html+=_renderOneFieldRO(fields[i],dataObj); i++;
        }
        html+='</div>';
      } else {
        html+=(dLbl2?'<div class="qa-form-divider"><span class="qa-form-divider-label">'+escHtml(dLbl2)+'</span></div>':'<div class="qa-form-divider"></div>');
        i++;
      }
      continue;
    }
    html+=_renderOneFieldRO(f,dataObj); i++;
  }
  return html;
}

function _renderOneFieldRO(f, dataObj) {
    var v=dataObj[f.key]!==undefined?dataObj[f.key]:"-";

      html += '<div class="mb-3"><div class="qa-label">' + nlToBr(f.label) + '</div>' + imgHtml + audit + '</div>';
      return html;

    if(f.type==="table"){

    if(f.type==="checkbox"){

      html+='<div class="mb-3"><div class="qa-label">'+nlToBr(f.label)+'</div>'+(isUrl?'<a href="'+url+'" target="_blank" class="qa-readonly-link"><i class="bi bi-box-arrow-up-right me-2"></i>'+url+'</a>':'<div class="qa-readonly-val">'+nlToBr(String(v))+'</div>')+audit+'</div>'; return html;

    }
    if(f.type==="toggle"){
      var isOn=v==="ON"||v==="Y"||v===true||v==="true";

    if(f.type==="toggle-group"){
      var tgItems = f.items && f.items.length ? f.items : [];

      }).join("");

    }
    if(f.type==="checkbox-group"){
      var cbItems = f.items && f.items.length ? f.items : [];

      var cgHds = '<th style="min-width:80px;"></th>'+cgCols.map(function(c){ return '<th style="text-align:center;font-size:.82rem;padding:4px 6px;">'+escHtml(c)+'</th>'; }).join("");

    }
    if(f.type==="tick-grid"){
      var tkRows = f.gridRows || [];
      var tkCols = f.gridCols || [];
      var tkHds = '<th style="min-width:80px;"></th>'+tkCols.map(function(c){ return '<th style="text-align:center;font-size:.82rem;padding:4px 6px;">'+escHtml(c)+'</th>'; }).join("");
      var tkBdy = tkRows.map(function(r, ri){
        var cells = '<td style="font-size:.85rem;padding:4px 6px;">'+escHtml(r)+'</td>'+tkCols.map(function(c, ci){
          var tkVal = dataObj[f.key+"_r"+ri+"_c"+ci];

          return '<td style="text-align:center;padding:4px 6px;font-size:1rem;">'+(isTk?"☑":"☐")+'</td>';

    return html;
}

// ── ดึงฟอร์มที่มีฟิลด์อย่างน้อย 1 ตัวที่มองเห็นได้จาก Section นี้ ──
function getFormsForSection(sec) {
  if (!sec) return [];
  return (APP.forms || []).filter(function(f) {
    if (!f.isActive) return false;
    // form-level assignment
    if (f.sectionId && f.sectionId === sec.sectionId) return true;
    // field-level: any field visible to this section
    return (f.fields || []).some(function(field) {
      if (!field.sectionIds || !field.sectionIds.length) return true;
      return field.sectionIds.indexOf(sec.sectionId) >= 0;
    });
  });
}

// ── คำนวณความคืบหน้าระดับฟิลด์ (ไม่นับ divider, image) ──
function _calcFieldProgress(secId, allForms, dataObj) {
  var total = 0, completed = 0;
  (allForms || []).forEach(function(form) {
    if (!form.isActive) return;
    // ── Form-level: ถ้า Form กำหนด sectionId ไว้ ให้ตรวจสอบก่อน ──
    if (form.sectionId && form.sectionId !== "" && form.sectionId !== "null") {
      var formSecIds = [];
      try {
        var sid = String(form.sectionId);
        formSecIds = (sid.charAt(0) === "[") ? JSON.parse(sid) : [sid];
      } catch(e) { formSecIds = [String(form.sectionId)]; }
      if (formSecIds.length > 0 && formSecIds.indexOf(secId) < 0) return; // Form ไม่ใช่ของ Section นี้
    }
    // ── Field-level count ──────────────────────────────────────────
    (form.fields || []).forEach(function(field) {
      if (field.type === "divider" || field.type === "image") return; // ไม่นับ divider และ image
      // toggle-group, checkbox-group, tick-grid เป็น multi-select ที่ไม่เลือกก็ถือว่าตอบแล้ว → ไม่นับในความคืบหน้า
      if (field.type === "toggle-group" || field.type === "checkbox-group" || field.type === "tick-grid") return;
      if (field.sectionIds && field.sectionIds.length && field.sectionIds.indexOf(secId) < 0) return;
      total++;
      if (field.type === "table") {
        // ตาราง: ข้อมูลเก็บในรูป key_rN_cN ไม่ใช่ key โดยตรง
        var prefix = field.key + "_r";
        var hasData = Object.keys(dataObj).some(function(k) {
          return k.indexOf(prefix) === 0
            && k.indexOf("_total_rows") < 0 && k.indexOf("_col_meta") < 0 && k.indexOf("_table_def") < 0
            && dataObj[k] !== "" && dataObj[k] !== null && dataObj[k] !== undefined;
        });
        if (hasData) completed++;
      } else if (field.type === "choice-grid") {
        // choice-grid: radio per row → มีค่าใน _rN = ตอบแล้ว
        var cgRows = field.gridRows || [];
        var cgKey = field.key || "";
        var cgFilled = cgKey && cgRows.some(function(r, ri) {
          var val = dataObj[cgKey+"_r"+ri];
          return val !== undefined && val !== null && val !== "";
        });
        if (cgFilled) completed++;
      } else {
        var v = dataObj[field.key];
        if (v !== undefined && v !== null && v !== "") completed++;
      }
    });
  });
  return { total: total, completed: completed, pct: total > 0 ? Math.round(completed / total * 100) : 0 };
}

function renderRawRO(dataObj) {
  var tableBaseKeys={}, totalRowKeys={}, normalKeys=[], extraKeys=[];
  Object.keys(dataObj).forEach(function(k){
    if(k.endsWith("_total_rows")){totalRowKeys[k]=true;return;}
    if(k.endsWith("_label")||k.endsWith("_raw")){return;}
    if(/_col\d+_\d+$/.test(k)){var base=k.replace(/_col\d+_\d+$/,"");tableBaseKeys[base]=true;return;}
    if(k.indexOf("_user_extra_")===0){extraKeys.push(k);return;}
    normalKeys.push(k);
  });
  var html="";
  if(normalKeys.length){
    html+='<div class="row">';
    normalKeys.forEach(function(k){
      html+='<div class="col-md-6 mb-3"><div class="qa-label">'+escHtml(k)+'</div><div class="qa-readonly-val">'+nlToBr(String(dataObj[k]||"-"))+'</div></div>';
    });
    html+='</div>';
  }
  Object.keys(tableBaseKeys).forEach(function(base){
    var maxC=0;
    Object.keys(dataObj).forEach(function(k){
      var esc=base.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      var m=k.match(new RegExp("^"+esc+"_col(\\d+)_\\d+$"));
      if(m) maxC=Math.max(maxC,parseInt(m[1])+1);
    });
    var fakeCols=Array.from({length:maxC},function(_,i){return "คอลัมน์ "+(i+1);});
    html+=_renderTableRO(base,base,fakeCols.join(","),dataObj);
  });
  if(!html) return '<p style="color:var(--txt-muted);text-align:center;padding:24px 0;"><i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:8px;"></i>ไม่มีข้อมูล</p>';
  return html;
}


// ── ฟังก์ชันตัวช่วยส่วนกลาง: แปลงและคำนวณ Section สำหรับ Manager ให้ตรงกัน 100% ทั้งระบบ ──
function resolveManagerSections(rawIds) {
    var assignedIds = [];
    if (Array.isArray(rawIds)) {
        assignedIds = rawIds;
    } else if (typeof rawIds === 'string') {
        try { 
            assignedIds = JSON.parse(rawIds); 
        } catch(e) { 
            assignedIds = rawIds.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
        }
    }

    var resultSecIds = [];
    var deptTexts = [];

    // 1. แปลงรหัส DEPT_ เป็น SEC_ (ดึงงานย่อยทั้งหมดที่อยู่ในฝ่ายนั้น)
    (APP.departments || []).forEach(function(d) {
        if (assignedIds.includes(d.deptId)) {
            var validSecs = (d.assignedSections||[]).filter(function(sid) {
                return APP.sections.some(function(sx){ return sx.sectionId === sid && sx.isActive; });
            });
            resultSecIds = resultSecIds.concat(validSecs);
            deptTexts.push(d.deptName + " (" + validSecs.length + " งาน)");
        }
    });

    // 2. ดักจับกรณีมอบหมายเป็นรหัส SEC_ ตรงๆ
    assignedIds.forEach(function(id) {
        if (String(id).startsWith("SEC_")) {
            var activeSec = APP.sections.find(function(sx){ return sx.sectionId === id && sx.isActive; });
            if (activeSec) resultSecIds.push(id);
        }
    });

    // 3. ลบค่าที่ซ้ำซ้อนกันทิ้ง
    resultSecIds = resultSecIds.filter(function(item, pos) { return resultSecIds.indexOf(item) === pos; });

    return {
        sectionIds: resultSecIds,
        displayStr: deptTexts.length > 0 ? deptTexts.join(" | ") : "ไม่ได้ระบุฝ่าย"
    };
}

// ── หน้าจอ Dashboard ของ Manager ตัวจริง ──
function renderManagerDashboard() {
  var yearEl = document.getElementById("mgr-year-select");
  if (!yearEl || !APP.user || !APP.user.profile) return;
  var year = yearEl.value;
  
  // ✅ เรียกใช้ฟังก์ชันส่วนกลางเพื่อความเป๊ะ 100%
  var resolved = resolveManagerSections(APP.user.profile.sections);
  
  var ms = APP.sections.filter(function(s) {
      return s.isActive && resolved.sectionIds.includes(s.sectionId);
  });

  var yd = APP.dashboard.filter(function(d) { return String(d.year) === String(year); });

  // คำนวณ progress จากจำนวนฟิลด์ที่กรอก
  // totalFields = max fields ต่อ 1 section, completedFields = เฉลี่ยต่อ section
  var _tfSum = 0, _cfSum = 0, _maxTF = 0;
  ms.forEach(function(sec) {
    var dashRow = null;
    for (var i = 0; i < yd.length; i++) { if (yd[i].sectionId === sec.sectionId) { dashRow = yd[i]; break; } }
    var dataObj = {};
    if (dashRow && dashRow.dataJson) { try { dataObj = JSON.parse(dashRow.dataJson); } catch(e) {} }
    var prog = _calcFieldProgress(sec.sectionId, APP.forms, dataObj);
    _tfSum += prog.total;
    _cfSum += prog.completed;
    if (prog.total > _maxTF) _maxTF = prog.total;
  });
  var totalFields = _maxTF;
  var completedFields = ms.length > 0 ? Math.round(_cfSum / ms.length) : 0;
  var sub = ms.filter(function(s) { return yd.some(function(d){ return d.sectionId === s.sectionId; }); }).length;
  var total = ms.length;
  var pct = _tfSum > 0 ? Math.round(_cfSum / _tfSum * 100) : 0;

  var headerDesc = document.querySelector("#view-manager-dashboard p.text-muted");
  if (headerDesc) {
      headerDesc.innerHTML = 'ติดตามและตรวจสอบ Section ในความดูแล<br><span style="color:var(--primary); font-size:0.85rem; font-weight:600; display:inline-block; margin-top:8px; padding:5px 12px; background:var(--primary-ul); border-radius:20px;"><i class="bi bi-building me-1"></i>ฝ่ายที่ดูแล: ' + resolved.displayStr + '</span>';
  }

  var sr = document.getElementById("mgr-stats-row");
  if (sr) {
    sr.innerHTML = '<div class="qa-stat-card"><div class="qa-stat-num">'+total+'</div><div class="qa-stat-label">Section รวมทั้งหมด</div></div>'
      + '<div class="qa-stat-card success"><div class="qa-stat-num">'+sub+'</div><div class="qa-stat-label">ส่งแล้ว</div></div>'
      + '<div class="qa-stat-card warning"><div class="qa-stat-num">'+completedFields+' / '+totalFields+'</div><div class="qa-stat-label">ฟิลด์ที่กรอก</div></div>'
      + '<div class="qa-stat-card accent"><div class="qa-stat-num">'+pct+'%</div><div class="qa-stat-label">ความคืบหน้า</div></div>';
  }
  
  if (typeof buildSectionCards === 'function') {
    buildSectionCards(ms, yd, "mgr-section-grid", year);
  }

  // IQA Virtual Dashboard สำหรับ Manager
  if (typeof renderIqaPublicView === 'function') {
    setTimeout(function() { renderIqaPublicView('mgr-iqa-container'); }, 50);
  }

  var editBtn = document.getElementById("mgr-edit-data-btn");
  if (editBtn) {
    if (APP.user && APP.user.profile && APP.user.profile.permission === "edit") {
      editBtn.style.display = "inline-flex";
    } else {
      editBtn.style.display = "none";
    }
  }
}

function renderVerifyDashboard() {
    var mSel = document.getElementById("verify-mgr-select");
    var dSel = document.getElementById("verify-dept-select");
    var ySel = document.getElementById("verify-year-select");
    
    if (!ySel || !ySel.value) return;
    var year = ySel.value;
    
    var targetSections = [];
    var title = "กรุณาเลือก Manager หรือ Department ด้านบน";
    var subTitle = "";
    
    if (mSel && mSel.value) {
        var mgr = null;
        if (APP.allUsersCache && APP.allUsersCache.managers) {
            mgr = APP.allUsersCache.managers.find(function(m){ 
                return m.email.trim().toLowerCase() === mSel.value.trim().toLowerCase(); 
            });
        }
        
        if (mgr) {
            // ✅ 1. แก้ไขการดึงค่า: บังคับให้เป็น Array เสมอ
            var raw = mgr.sections;
            var processedIds = [];
            
            if (Array.isArray(raw)) {
                processedIds = raw;
            } else if (typeof raw === 'string' && raw.trim() !== "") {
                try {
                    // พยายาม parse ถ้าเป็น JSON string เช่น "["DEPT_1"]"
                    processedIds = JSON.parse(raw);
                } catch(e) {
                    // ถ้าไม่ใช่ JSON ให้แยกด้วย comma
                    processedIds = raw.split(',').map(function(id){ return id.trim(); });
                }
            }

            // ✅ 2. เรียกฟังก์ชันแปลง DEPT เป็น SEC
            var resolved = resolveManagerSections(processedIds);
            targetSections = resolved.sectionIds;
            
            console.log("Verify Manager:", mgr.email, "Processed IDs:", processedIds, "Resolved SECs:", targetSections);

            title = "Section ในความดูแลของ: " + (mgr.prefix||"") + (mgr.fname||"") + " " + (mgr.lname||"");
            subTitle = '<span style="color:var(--primary); font-size:0.85rem; font-weight:600; display:inline-block; margin-top:8px; padding:4px 10px; background:var(--primary-ul); border-radius:20px;"><i class="bi bi-building me-1"></i>ฝ่ายที่ดูแล: ' + resolved.displayStr + '</span>';
        }
    } else if (dSel && dSel.value) {
        var dept = APP.departments.find(function(d){ return d.deptId === dSel.value; });
        if (dept) {
            targetSections = dept.assignedSections || [];
            title = "Section ทั้งหมดในฝ่าย: " + dept.deptName;
        }
    } else {
        // กรณีไม่ได้เลือกอะไรเลย
        document.getElementById("verify-stats-row").innerHTML = "";
        document.getElementById("verify-section-grid").innerHTML = '<div class="qa-alert qa-alert-warning w-100"><i class="bi bi-info-circle-fill"></i><span>เลือก Manager หรือ Department เพื่อตรวจสอบหน้าจอ Dashboard</span></div>';
        document.getElementById("verify-grid-title").innerHTML = '<i class="bi bi-bar-chart-fill me-2"></i>' + title;
        return;
    }
    
    // ✅ 3. กรองเฉพาะ Section ที่มีอยู่จริงและ Active
    var ms = APP.sections.filter(function(s) { 
        // แปลง id เป็น String ทั้งคู่ป้องกันการเทียบ Type ผิดพลาด
        return s.isActive && targetSections.map(String).includes(String(s.sectionId)); 
    });
    
    var yd = APP.dashboard.filter(function(d) { return String(d.year) === String(year); });
    var sub = ms.filter(function(s) { return yd.some(function(d){ return d.sectionId === s.sectionId; }); }).length;
    var total = ms.length;
    var pct = total > 0 ? Math.round(sub / total * 100) : 0;
    
    var sr = document.getElementById("verify-stats-row");
    if (sr) {
      sr.innerHTML = '<div class="qa-stat-card"><div class="qa-stat-num">'+total+'</div><div class="qa-stat-label">Section เป้าหมาย</div></div>'
        + '<div class="qa-stat-card success"><div class="qa-stat-num">'+sub+'</div><div class="qa-stat-label">ส่งแล้ว</div></div>'
        + '<div class="qa-stat-card warning"><div class="qa-stat-num">'+(total-sub)+'</div><div class="qa-stat-label">รอดำเนินการ</div></div>'
        + '<div class="qa-stat-card accent"><div class="qa-stat-num">'+pct+'%</div><div class="qa-stat-label">ความคืบหน้า</div></div>';
    }
    
    var vt = document.getElementById("verify-grid-title");
    if (vt) {
        vt.innerHTML = '<div style="margin-bottom:12px;"><i class="bi bi-bar-chart-fill me-2"></i>' + title + '</div>' + subTitle;
    }
    
    if (typeof buildSectionCards === 'function') {
      // ถ้าไม่มีข้อมูลเลย ให้โชว์ Alert แทน grid ว่างๆ
      if (ms.length === 0) {

      } else {
          buildSectionCards(ms, yd, "verify-section-grid", year);
      }
    }
}

  document.querySelectorAll(".qa-tab-link").forEach(function(el){el.classList.remove("active");});
  var t=document.getElementById(tabId); if(t) t.classList.add("active");
  var a=document.querySelector('[data-tab="'+tabId+'"]'); if(a) a.classList.add("active");
  // Lazy render: โหลดข้อมูลเมื่อสลับ tab เพื่อให้แน่ใจว่าแสดงข้อมูลล่าสุดเสมอ
  if(tabId==="tab-forms")         { if(typeof renderFormList==="function") renderFormList(); }
  if(tabId==="tab-users")         { if(typeof loadAllUsers==="function") loadAllUsers(); }
  if(tabId==="tab-settings")      { if(typeof renderSettingsYearList==="function") renderSettingsYearList(); }
  if(tabId==="tab-theme")         initThemeEditor();
  if(tabId==="tab-stats")         loadVisitStats();
  if(tabId==="tab-iqa")           initIqaTab();
  // ✅ Lazy render: โหลดตารางแบบฟอร์มรายงานทุกครั้งที่ Admin เปิด Tab นี้
  if(tabId==="tab-report-forms")  { if(typeof renderReportFormAdminSection==="function") renderReportFormAdminSection(); }
  if(tabId==="tab-doc-tracking")  { if(typeof renderDocTrackingAdmin==="function") renderDocTrackingAdmin(); }
  if(tabId==="tab-maintenance")   { loadDatabaseStats(); populateArchiveYearSelect(); }
}

function _formatMoneyRO(val) {
  var num=parseFloat(String(val).replace(/[^0-9.]/g,""));
  if(isNaN(num)) return val||"-";
  return num.toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2})+" บาท";
}
