<script>
// ============================================================
// js_iqa.html — Dynamic IQA Schema Builder + Public View
// Task 1: Dynamic IQA Mapping Builder (แทน hardcode IQA_PAGES)
// ============================================================

// ── ตัวแปร State ────────────────────────────────────────────
var _iqaBuilderActivePhaseIdx = 0;   // Phase tab ที่กำลัง active ใน builder
var _iqaBuilderActivePageKey  = -1;  // phaseIdx*1000+pageIdx ของ page ที่ expand

// ── คำนวณ APP._iqaPages และ APP.iqaMapping จาก schema ────────
// เรียกทุกครั้งที่ schema เปลี่ยน เพื่อให้ rendering functions ใช้งานได้
function _computeFromSchema(schema) {
  if (!schema || !schema.phases) return;
  var pages = {}, mapping = {};
  (schema.phases || []).forEach(function(phase) {
    (phase.pages || []).forEach(function(page) {
      pages[page.pageId] = {
        id:        page.pageId,
        name:      page.pageName,
        phase:     phase.phaseId,
        phaseName: phase.phaseName,
        route:     page.route || "",
        sections:  (page.items || []).map(function(it){ return it.label; }),
        items:     page.items || [],  // ✅ เก็บ raw items ไว้ให้ _buildIqaPubAccordions ใช้
        tables:    []
      };
      mapping[page.pageId] = {};
      (page.items || []).forEach(function(item) {
        if (item.formId) {
          mapping[page.pageId][item.label] = { formId: item.formId, fieldKey: item.fieldKey || "" };
        }
      });
    });
  });
  APP._iqaPages  = pages;
  APP.iqaMapping = mapping;
}

// ── Backward Compat: _iqaGetUniquePages ────────────────────
// ใช้กับ code เดิมที่อาจเรียก Phase1/Phase2 โดยตรง
function _iqaGetUniquePages(phaseId) {
  if (!APP._iqaPages) _computeFromSchema(APP.iqaSchema || { phases: [] });
  return Object.values(APP._iqaPages || {}).filter(function(p){ return p.phase === phaseId; });
}

// ════════════════════════════════════════════════════════════
// Task 1: IQA Schema Builder UI
// ════════════════════════════════════════════════════════════

function initIqaTab() {
  if (!APP.iqaSchema) APP.iqaSchema = { phases: [] };
  _computeFromSchema(APP.iqaSchema);
  _iqaBuilderActivePhaseIdx = 0;
  _iqaBuilderActivePageKey  = -1;

  // ตั้งค่า container structure ใน iqa-builder-wrap (ถ้ายังไม่มี)
  var wrap = document.getElementById("iqa-builder-wrap");
  if (wrap && !document.getElementById("iqa-builder-area")) {
    wrap.innerHTML = '<div id="iqa-builder-area"></div>'
      + '<div id="iqa-preview-area" style="display:none;">'
      + '<div id="iqa-preview-container"></div></div>';
  }
  _iqaBuilderRender();
}

// ── สลับ Mode: builder ↔ preview ──────────────────────────
function iqaBuilderSetMode(mode) {
  var bArea = document.getElementById("iqa-builder-area");
  var pArea = document.getElementById("iqa-preview-area");
  var bBtn  = document.getElementById("iqa-mode-build-btn");
  var pBtn  = document.getElementById("iqa-mode-preview-btn");
  if (bBtn) bBtn.className = mode === "build"   ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  if (pBtn) pBtn.className = mode === "preview" ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  if (bArea) bArea.style.display = mode === "build" ? "block" : "none";
  if (pArea) pArea.style.display = mode === "preview" ? "block" : "none";
  if (mode === "preview") {
    _computeFromSchema(APP.iqaSchema);
    renderIqaPublicView("iqa-preview-container");
  }
}

// ── Render Builder ─────────────────────────────────────────
function _iqaBuilderRender() {
  var c = document.getElementById("iqa-builder-area");
  if (!c) return;
  var schema = APP.iqaSchema || { phases: [] };
  var phases = schema.phases || [];

  // Phase tabs
  var tabsHtml = '<div class="d-flex gap-2 flex-wrap align-items-center mb-3" style="border-bottom:1px solid var(--border);padding-bottom:10px;">';
  phases.forEach(function(phase, pi) {
    tabsHtml += '<button class="'+(pi===_iqaBuilderActivePhaseIdx?"qa-btn-primary":"qa-btn-ghost")+' btn-sm" '
      +'onclick="_iqaBuilderSelectPhase('+pi+')">'
      +'<i class="bi bi-layers-fill me-1"></i>'+escHtml(phase.phaseName)+'</button>';
  });
  tabsHtml += '<button class="qa-btn-ghost btn-sm" style="border-style:dashed;" onclick="iqaShowAddPhaseModal()">'
    +'<i class="bi bi-plus-circle-fill me-1"></i>เพิ่ม Phase</button></div>';

  // Content
  var content = "";
  if (!phases.length) {
    content = '<div class="qa-alert qa-alert-info"><i class="bi bi-info-circle-fill"></i>'
      +'<span>ยังไม่มี Phase — กดปุ่ม <strong>เพิ่ม Phase</strong> เพื่อเริ่มสร้าง IQA Schema</span></div>';
  } else if (_iqaBuilderActivePhaseIdx < phases.length) {
    content = _iqaRenderPhaseContent(_iqaBuilderActivePhaseIdx);
  }

  // Footer stats + save
  var totalPages = phases.reduce(function(s,ph){return s+(ph.pages||[]).length;},0);
  var totalItems = phases.reduce(function(s,ph){return s+(ph.pages||[]).reduce(function(ss,pg){return ss+(pg.items||[]).length;},0);},0);
  var footer = '<div class="d-flex justify-content-between align-items-center mt-4 pt-3" style="border-top:1px solid var(--border);">'
    +'<span class="text-muted small"><i class="bi bi-diagram-3 me-1"></i>'
    +phases.length+' Phases &bull; '+totalPages+' Pages &bull; '+totalItems+' Items</span>'
    +'<button class="qa-btn-success" onclick="iqaSaveSchema()" id="iqa-save-schema-btn">'
    +'<i class="bi bi-save-fill me-1"></i>บันทึก Schema</button></div>';

  c.innerHTML = tabsHtml + content + footer;
}

// ── Render Phase Content ────────────────────────────────────
function _iqaRenderPhaseContent(phaseIdx) {
  var phase = (APP.iqaSchema.phases || [])[phaseIdx];
  if (!phase) return "";

  var totalPages = (phase.pages||[]).length;
  var totalItems = (phase.pages||[]).reduce(function(s,pg){return s+(pg.items||[]).length;},0);
  var mappedItems = (phase.pages||[]).reduce(function(s,pg){return s+(pg.items||[]).filter(function(it){return it.formId;}).length;},0);

  // Phase header card
  var html = '<div class="qa-glass-card p-3 mb-3" style="border-left:4px solid var(--primary);">'
    +'<div class="d-flex align-items-center gap-2 flex-wrap">'
    +'<i class="bi bi-layers-fill text-primary"></i>'
    +'<strong style="color:var(--txt);">'+escHtml(phase.phaseName)+'</strong>'
    +'<span style="font-size:.72rem;background:var(--primary-ul);color:var(--primary);padding:1px 8px;border-radius:10px;">'
    +mappedItems+'/'+totalItems+' Mapped &bull; '+totalPages+' Pages</span>'
    +'<div class="ms-auto d-flex gap-1">'
    +'<button class="qa-btn-ghost btn-sm" onclick="iqaShowEditPhaseModal('+phaseIdx+')" title="แก้ไขชื่อ Phase"><i class="bi bi-pencil-fill"></i></button>'
    +'<button class="qa-btn-ghost btn-sm" style="color:var(--danger);" title="ลบ Phase" '
    +'onclick="openDeleteConfirm(\'iqa-phase\',\''+phaseIdx+'\',\''+escHtml(phase.phaseName)+'\')"><i class="bi bi-trash-fill"></i></button>'
    +'</div></div></div>';

  // Pages
  (phase.pages || []).forEach(function(page, pgi) {
    var pageKey = phaseIdx * 1000 + pgi;
    var isOpen  = (_iqaBuilderActivePageKey === pageKey);
    var pMapped = (page.items||[]).filter(function(it){return it.formId;}).length;
    var pTotal  = (page.items||[]).length;
    var statusColor = pMapped === pTotal && pTotal > 0 ? "var(--success)" : pMapped > 0 ? "var(--warning)" : "var(--border)";

    html += '<div class="qa-glass-card mb-2" style="border-left:3px solid '+statusColor+';">'
      +'<div class="d-flex align-items-center gap-2 p-3" style="cursor:pointer;" onclick="_iqaTogglePage('+phaseIdx+','+pgi+')">'
      +'<i class="bi bi-chevron-right" style="font-size:.8rem;color:var(--txt-muted);transition:.2s;'+(isOpen?"transform:rotate(90deg);":"")+'"></i>'
      +'<i class="bi bi-file-earmark-text" style="color:var(--primary);"></i>'
      +'<span style="font-weight:700;color:var(--txt);">'+escHtml(page.pageName)+'</span>'
      +(page.route?'<span style="font-size:.68rem;font-family:monospace;color:var(--txt-muted);">'+escHtml(page.route)+'</span>':'')
      +'<span class="ms-auto" style="font-size:.7rem;background:var(--surface-3);color:var(--txt-muted);padding:1px 8px;border-radius:10px;white-space:nowrap;">'
      +pMapped+'/'+pTotal+' Mapped</span>'
      +'<div class="d-flex gap-1 ms-2" onclick="event.stopPropagation();">'
      +'<button class="qa-btn-ghost btn-sm" onclick="iqaShowEditPageModal('+phaseIdx+','+pgi+')" title="แก้ไข Page"><i class="bi bi-pencil-fill"></i></button>'
      +'<button class="qa-btn-ghost btn-sm" style="color:var(--danger);" title="ลบ Page" '
      +'onclick="openDeleteConfirm(\'iqa-page\',\''+phaseIdx+':'+pgi+'\',\''+escHtml(page.pageName)+'\')"><i class="bi bi-trash-fill"></i></button>'
      +'</div></div>';

    // Items section
    html += '<div style="display:'+(isOpen?"block":"none")+';padding:0 12px 12px;" id="pg-items-'+phaseIdx+'-'+pgi+'">';
    (page.items || []).forEach(function(item, iti) {
      html += _iqaRenderItemRow(item, phaseIdx, pgi, iti);
    });
    html += '<button class="qa-btn-ghost btn-sm" style="border-style:dashed;font-size:.78rem;margin-top:6px;" '
      +'onclick="iqaShowAddItemModal('+phaseIdx+','+pgi+')">'
      +'<i class="bi bi-plus-circle me-1"></i>เพิ่ม Item / Label</button></div></div>';
  });

  html += '<button class="qa-btn-ghost btn-sm" style="border-style:dashed;margin-top:4px;" onclick="iqaShowAddPageModal('+phaseIdx+')">'
    +'<i class="bi bi-plus-circle-fill me-1"></i>เพิ่ม Page</button>';

  return html;
}

// ── Render Item Row (inline form/field dropdowns) ───────────
function _iqaRenderItemRow(item, phi, pgi, iti) {
  var isMapped = !!(item.formId);

  // Form options
  var fOpts = '<option value="">— เลือก Form —</option>';
  (APP.forms || []).forEach(function(f) {
    if (!f.isActive) return;
    fOpts += '<option value="'+escHtml(f.formId)+'"'+(item.formId===f.formId?' selected':'')+'>'+escHtml(f.formName)+'</option>';
  });

  // Field options (แสดงเฉพาะเมื่อมี formId)
  var fieldOpts = '<option value="">— ทั้ง Form (ภาพรวม) —</option>';
  if (item.formId) {
    var selForm = (APP.forms||[]).find(function(f){return f.formId===item.formId;});
    if (selForm) {
      (selForm.fields||[]).forEach(function(fld){
        if (!fld.label || fld.type==="divider") return;
        fieldOpts += '<option value="'+escHtml(fld.key)+'"'+(item.fieldKey===fld.key?' selected':'')+'>'+escHtml(fld.label)+'</option>';
      });
    }
  }

  return '<div class="d-flex align-items-flex-start gap-2 mb-2 p-2" style="background:var(--surface);border-radius:6px;border:1px solid var(--border);">'
    +'<div style="flex-shrink:0;padding-top:4px;">'
    +(isMapped?'<i class="bi bi-check-circle-fill" style="color:var(--success);"></i>'
              :'<i class="bi bi-circle" style="color:var(--border-2);"></i>')
    +'</div>'
    +'<div style="flex:1;min-width:0;">'
    +'<div style="font-size:.82rem;font-weight:600;color:var(--txt-2);margin-bottom:5px;">'+escHtml(item.label)+'</div>'
    +'<div class="d-flex flex-wrap gap-2 align-items-center">'
    +'<select class="qa-input" style="flex:1;min-width:150px;font-size:.78rem;padding:4px 8px;" '
    +'onchange="iqaBuilderOnFormChange(this,'+phi+','+pgi+','+iti+')">'
    +fOpts+'</select>'
    +'<select class="qa-input" id="iqa-fld-'+phi+'-'+pgi+'-'+iti+'" '
    +'style="flex:1;min-width:150px;font-size:.78rem;padding:4px 8px;display:'+(item.formId?"inline-block":"none")+'" '
    +'onchange="iqaBuilderOnFieldChange(this,'+phi+','+pgi+','+iti+')">'
    +fieldOpts+'</select>'
    +'</div></div>'
    +'<button class="qa-btn-ghost btn-sm" style="color:var(--danger);padding:4px 8px;flex-shrink:0;" '
    +'onclick="iqaDeleteItem('+phi+','+pgi+','+iti+')" title="ลบ Item">'
    +'<i class="bi bi-x-lg"></i></button></div>';
}

// ── State helpers ───────────────────────────────────────────
function _iqaBuilderSelectPhase(idx) {
  _iqaBuilderActivePhaseIdx = idx;
  _iqaBuilderActivePageKey  = -1;
  _iqaBuilderRender();
}
function _iqaTogglePage(phaseIdx, pageIdx) {
  var key = phaseIdx * 1000 + pageIdx;
  _iqaBuilderActivePageKey = (_iqaBuilderActivePageKey === key) ? -1 : key;
  _iqaBuilderRender();
}

// ── Phase CRUD ──────────────────────────────────────────────
function iqaShowAddPhaseModal() {
  document.getElementById("iqa-phase-edit-idx").value   = "-1";
  document.getElementById("iqa-phase-name-input").value = "";
  document.getElementById("iqa-phase-modal-title").innerText = "เพิ่ม Phase ใหม่";
  new bootstrap.Modal(document.getElementById("modal-iqa-phase")).show();
}
function iqaShowEditPhaseModal(phaseIdx) {
  var ph = (APP.iqaSchema.phases||[])[phaseIdx] || {};
  document.getElementById("iqa-phase-edit-idx").value   = phaseIdx;
  document.getElementById("iqa-phase-name-input").value = ph.phaseName || "";
  document.getElementById("iqa-phase-modal-title").innerText = "แก้ไขชื่อ Phase";
  new bootstrap.Modal(document.getElementById("modal-iqa-phase")).show();
}
function iqaPhaseModalSave() {
  var name = (document.getElementById("iqa-phase-name-input").value || "").trim();
  if (!name) { showToast("กรุณากรอกชื่อ Phase","warning"); return; }
  var idx  = parseInt(document.getElementById("iqa-phase-edit-idx").value, 10);
  if (!APP.iqaSchema) APP.iqaSchema = { phases: [] };
  if (idx >= 0) {
    APP.iqaSchema.phases[idx].phaseName = name;
  } else {
    APP.iqaSchema.phases.push({ phaseId: "PH_"+Date.now(), phaseName: name, pages: [] });
    _iqaBuilderActivePhaseIdx = APP.iqaSchema.phases.length - 1;
  }
  var mi = bootstrap.Modal.getInstance(document.getElementById("modal-iqa-phase")); if(mi)mi.hide();
  _iqaBuilderRender();
}

// ── Page CRUD ───────────────────────────────────────────────
function iqaShowAddPageModal(phaseIdx) {
  document.getElementById("iqa-page-edit-phase-idx").value = phaseIdx;
  document.getElementById("iqa-page-edit-page-idx").value  = "-1";
  document.getElementById("iqa-page-name-input").value  = "";
  document.getElementById("iqa-page-route-input").value = "";
  document.getElementById("iqa-page-modal-title").innerText = "เพิ่ม Page ใหม่";
  new bootstrap.Modal(document.getElementById("modal-iqa-page")).show();
}
function iqaShowEditPageModal(phaseIdx, pageIdx) {
  var ph  = (APP.iqaSchema.phases||[])[phaseIdx] || {};
  var pg  = (ph.pages||[])[pageIdx] || {};
  document.getElementById("iqa-page-edit-phase-idx").value = phaseIdx;
  document.getElementById("iqa-page-edit-page-idx").value  = pageIdx;
  document.getElementById("iqa-page-name-input").value  = pg.pageName || "";
  document.getElementById("iqa-page-route-input").value = pg.route    || "";
  document.getElementById("iqa-page-modal-title").innerText = "แก้ไข Page";
  new bootstrap.Modal(document.getElementById("modal-iqa-page")).show();
}
function iqaPageModalSave() {
  var name  = (document.getElementById("iqa-page-name-input").value  || "").trim();
  if (!name) { showToast("กรุณากรอกชื่อ Page","warning"); return; }
  var route = (document.getElementById("iqa-page-route-input").value || "").trim();
  var phi   = parseInt(document.getElementById("iqa-page-edit-phase-idx").value, 10);
  var pgi   = parseInt(document.getElementById("iqa-page-edit-page-idx").value,  10);
  var phase = (APP.iqaSchema.phases||[])[phi];
  if (!phase) return;
  if (!phase.pages) phase.pages = [];
  if (pgi >= 0) {
    phase.pages[pgi].pageName = name;
    phase.pages[pgi].route    = route;
  } else {
    phase.pages.push({ pageId: "PG_"+Date.now(), pageName: name, route: route, items: [] });
    _iqaBuilderActivePageKey = phi * 1000 + (phase.pages.length - 1);
  }
  var mi = bootstrap.Modal.getInstance(document.getElementById("modal-iqa-page")); if(mi)mi.hide();
  _iqaBuilderRender();
}

// ── Item CRUD ───────────────────────────────────────────────
function iqaShowAddItemModal(phaseIdx, pageIdx) {
  document.getElementById("iqa-item-phase-idx").value = phaseIdx;
  document.getElementById("iqa-item-page-idx").value  = pageIdx;
  document.getElementById("iqa-item-label-input").value = "";
  new bootstrap.Modal(document.getElementById("modal-iqa-item")).show();
}
function iqaItemModalSave() {
  var label = (document.getElementById("iqa-item-label-input").value || "").trim();
  if (!label) { showToast("กรุณากรอก Label / หัวข้อ","warning"); return; }
  var phi  = parseInt(document.getElementById("iqa-item-phase-idx").value, 10);
  var pgi  = parseInt(document.getElementById("iqa-item-page-idx").value,  10);
  var page = ((APP.iqaSchema.phases||[])[phi]||{}).pages;
  if (!page || !page[pgi]) return;
  if (!page[pgi].items) page[pgi].items = [];
  page[pgi].items.push({ itemId: "IT_"+Date.now(), label: label, formId: "", fieldKey: "" });
  var mi = bootstrap.Modal.getInstance(document.getElementById("modal-iqa-item")); if(mi)mi.hide();
  _iqaBuilderRender();
}
function iqaDeleteItem(phaseIdx, pageIdx, itemIdx) {
  var page = ((APP.iqaSchema.phases||[])[phaseIdx]||{}).pages;
  if (!page || !page[pageIdx] || !page[pageIdx].items) return;
  var label = (page[pageIdx].items[itemIdx]||{}).label || "Item นี้";
  if (!confirm('ลบ "'+label+'" ใช่หรือไม่?')) return;
  page[pageIdx].items.splice(itemIdx, 1);
  _iqaBuilderRender();
}

// ── Mapping Dropdowns (inline in builder) ───────────────────
function iqaBuilderOnFormChange(sel, phi, pgi, iti) {
  var formId = sel.value;
  var pages  = ((APP.iqaSchema.phases||[])[phi]||{}).pages || [];
  var item   = (pages[pgi]||{}).items ? pages[pgi].items[iti] : null;
  if (!item) return;
  item.formId   = formId;
  item.fieldKey = "";

  // อัปเดต field select ทันที (ไม่ต้อง re-render ทั้งหน้า)
  var fldSel = document.getElementById("iqa-fld-"+phi+"-"+pgi+"-"+iti);
  if (fldSel) {
    if (formId) {
      fldSel.style.display = "inline-block";
      var opts = '<option value="">— ทั้ง Form (ภาพรวม) —</option>';
      var form = (APP.forms||[]).find(function(f){return f.formId===formId;});
      if (form) {
        (form.fields||[]).forEach(function(fld){
          if (!fld.label || fld.type==="divider") return;
          opts += '<option value="'+escHtml(fld.key)+'">'+escHtml(fld.label)+'</option>';
        });
      }
      fldSel.innerHTML = opts;
    } else {
      fldSel.style.display = "none";
    }
  }
  _computeFromSchema(APP.iqaSchema);
}
function iqaBuilderOnFieldChange(sel, phi, pgi, iti) {
  var pages = ((APP.iqaSchema.phases||[])[phi]||{}).pages || [];
  var item  = (pages[pgi]||{}).items ? pages[pgi].items[iti] : null;
  if (item) item.fieldKey = sel.value;
  _computeFromSchema(APP.iqaSchema);
}

// ── Schema Save ─────────────────────────────────────────────
function iqaSaveSchema() {
  var btn = document.getElementById("iqa-save-schema-btn");
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังบันทึก...'; }
  _computeFromSchema(APP.iqaSchema); // sync mapping ก่อนส่ง
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก Schema'; }
      if (res && res.success) {
        showToast("บันทึก IQA Schema สำเร็จ","success");
      } else showToast((res&&res.message)||"เกิดข้อผิดพลาด","danger");
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก Schema'; }
      showToast(err.message||err,"danger");
    })
    .saveIqaSchema(APP.iqaSchema || { phases: [] });
}

// ════════════════════════════════════════════════════════════
// Task 2: IQA Public View — ใช้ได้กับหลาย Container
// containerIdParam: id ของ container ที่จะวาด IQA view
// ════════════════════════════════════════════════════════════
function renderIqaPublicView(containerIdParam) {
  // หา year จาก select ต่างๆ ที่มีในหน้า
  var year = "";
  ["public-year-select","mgr-year-select","admin-year-select"].forEach(function(sid){
    var el = document.getElementById(sid);
    if (el && el.value && !year) year = el.value;
  });

  var cid = containerIdParam || "iqa-view-content";
  var container = document.getElementById(cid);
  if (!container) return;

  _computeFromSchema(APP.iqaSchema || { phases: [] });
  var schema = APP.iqaSchema || { phases: [] };

  if (!schema.phases || !schema.phases.length) {
    container.innerHTML = '<div class="qa-alert qa-alert-info mt-2"><i class="bi bi-info-circle-fill"></i>'
      +'<span>ยังไม่มี IQA Schema — Admin ต้องสร้าง Schema ก่อน</span></div>';
    return;
  }

  // Phase tabs
  var tabsHtml = '<div class="qa-iqa-phase-bar mb-3">';
  schema.phases.forEach(function(phase, pi) {
    tabsHtml += '<button class="'+(pi===0?"qa-btn-primary":"qa-btn-ghost")+' btn-sm" '
      +'id="iqa-pub-phase-btn-'+cid+'-'+pi+'" '
      +'onclick="iqaPubSelectPhaseByIdx('+pi+',\''+cid+'\')">'
      +escHtml(phase.phaseName)+'</button>';
  });
  tabsHtml += '</div>';

  // Phase panels
  var panels = schema.phases.map(function(phase, pi) {
    var pages = Object.values(APP._iqaPages||{}).filter(function(p){ return p.phase===phase.phaseId; });
    return '<div id="iqa-pub-phase-panel-'+cid+'-'+pi+'" style="display:'+(pi===0?"block":"none")+'">'
      +_buildIqaPubAccordions(pages, year, cid+"-p"+pi)+'</div>';
  }).join("");

  container.innerHTML = tabsHtml + panels;
}

// สลับ Phase tab ใน public view (ใช้ได้กับทุก container)
function iqaPubSelectPhaseByIdx(targetIdx, cid) {
  var schema = APP.iqaSchema || { phases: [] };
  schema.phases.forEach(function(ph, pi) {
    var panel = document.getElementById("iqa-pub-phase-panel-"+cid+"-"+pi);
    var btn   = document.getElementById("iqa-pub-phase-btn-"+cid+"-"+pi);
    if (panel) panel.style.display = pi===targetIdx ? "block" : "none";
    if (btn)   btn.className       = pi===targetIdx ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  });
}

// ── Helper: หา sectionId ที่เหมาะสมสำหรับ form+field ──────────
// ลำดับ priority: form.sectionId → field.sectionIds → section.assignedFormIDs → first active
function _iqaResolveSecId(formObj, fieldKey) {
  if (!formObj) return "";
  if (formObj.sectionId) return formObj.sectionId;
  if (fieldKey) {
    var fld = (formObj.fields||[]).find(function(f){ return f.key === fieldKey; });
    if (fld && fld.sectionIds && fld.sectionIds.length) return fld.sectionIds[0];
  }
  // ค้นจาก section.assignedFormIDs (วิธี Admin กำหนดใน Section Editor)
  var sec = (APP.sections||[]).find(function(s){
    return s.isActive && (s.assignedFormIDs||[]).indexOf(formObj.formId) >= 0;
  });
  if (sec) return sec.sectionId;
  var fs = (APP.sections||[]).find(function(s){ return s.isActive; });
  return fs ? fs.sectionId : "";
}

// ── Accordion Builder (Public View Rendering) ─────────────────
// รองรับทั้ง New items format (page.items) และ Legacy format (page.sections + mapping[label])
// เมื่อ fieldKey = "" (ทั้ง Form) → แสดงทุก field ของ Form นั้น
function _buildIqaPubAccordions(pages, year, prefix) {
  if (!pages || !pages.length) return '<div class="qa-alert qa-alert-info"><i class="bi bi-info-circle-fill"></i><span>ไม่มีข้อมูล</span></div>';
  var pfx = prefix ? prefix+"-" : "";

  return pages.map(function(page, pi) {
    var mappedCount = 0, dataCount = 0;
    var secHtml     = '';

    // ── New items-based format (page.items) ──────────────────
    var items = page.items || [];
    if (items.length) {
      items.forEach(function(item) {
        var fid     = item.formId   || "";
        var fldKey  = item.fieldKey || "";
        var lbl     = item.label    || "";
        var formObj = fid ? (APP.forms||[]).find(function(f){ return f.formId===fid; }) : null;

        if (!fid) {
          // ยังไม่ได้ Mapping
          secHtml += '<div class="qa-iqa-field-row">'
            +'<div class="qa-iqa-field-label">'+escHtml(lbl)+'</div>'
            +'<div class="qa-iqa-field-val"><div class="qa-iqa-val-none">ยังไม่ได้ Mapping</div></div></div>';
          return;
        }

        if (fldKey) {
          // ── map ฟิลด์เจาะจง ──────────────────────────────
          mappedCount++;
          var secId = _iqaResolveSecId(formObj, fldKey);
          var sub   = secId && year
            ? (APP.dashboard||[]).find(function(d){ return d.sectionId===secId && String(d.year)===String(year); })
            : null;
          var dObj  = {}; if(sub){ try{ dObj=JSON.parse(sub.dataJson||"{}"); }catch(e){} }
          var val   = dObj[fldKey];
          var hasV  = val !== undefined && val !== null && val !== "";
          if (hasV) dataCount++;
          var valHtml = hasV
            ? '<div class="qa-iqa-val-mapped"><i class="bi bi-check-circle-fill me-1"></i>'
              +'<strong>'+(formObj?escHtml(formObj.formName):fid)+'</strong> › <span>'+escHtml(String(val))+'</span></div>'
            : '<div class="qa-iqa-val-empty"><i class="bi bi-hourglass-split me-1"></i>'
              +'<strong>'+(formObj?escHtml(formObj.formName):fid)+'</strong>'
              +' › <span style="color:var(--txt-muted);">ยังไม่มีข้อมูลในปีนี้</span></div>';
          secHtml += '<div class="qa-iqa-field-row"><div class="qa-iqa-field-label">'+escHtml(lbl)+'</div>'
            +'<div class="qa-iqa-field-val">'+valHtml+'</div></div>';

        } else {
          // ── map ทั้ง Form (fieldKey = "") → แสดงทุก field ────
          // เหตุผล: Admin เลือกแค่ Form โดยไม่ระบุ field → ต้องแสดงทุก field ของ Form นั้น
          mappedCount++;
          var visFields = (formObj ? formObj.fields||[] : []).filter(function(fld){
            return fld.type !== "divider" && fld.label;
          });

          if (!visFields.length) {
            secHtml += '<div class="qa-iqa-field-row"><div class="qa-iqa-field-label">'+escHtml(lbl)+'</div>'
              +'<div class="qa-iqa-field-val"><div class="qa-iqa-val-empty"><i class="bi bi-dash-circle me-1"></i>Form ไม่มีฟิลด์</div></div></div>';
            return;
          }

          // แสดง header ชื่อ Form + ชื่อ label
          secHtml += '<div class="qa-iqa-field-row" style="background:var(--primary-ul);padding:6px 10px;border-radius:var(--r-sm) var(--r-sm) 0 0;">'
            +'<div class="qa-iqa-field-label" style="font-weight:700;color:var(--primary);">'
            +'<i class="bi bi-file-earmark-text me-1"></i>'+escHtml(lbl)
            +(formObj?' — <span style="font-weight:400;">'+escHtml(formObj.formName)+'</span>':'')
            +'</div><div class="qa-iqa-field-val"></div></div>';

          // วนแสดงทุก field
          visFields.forEach(function(fld) {
            var fSecId = _iqaResolveSecId(formObj, fld.key);
            var fSub   = fSecId && year
              ? (APP.dashboard||[]).find(function(d){ return d.sectionId===fSecId && String(d.year)===String(year); })
              : null;
            var fdObj  = {}; if(fSub){ try{ fdObj=JSON.parse(fSub.dataJson||"{}"); }catch(e){} }
            var fVal   = fdObj[fld.key];
            var fHasV  = fVal !== undefined && fVal !== null && fVal !== "";
            if (fHasV) dataCount++;
            var fValHtml = fHasV
              ? '<div class="qa-iqa-val-mapped"><i class="bi bi-check-circle-fill me-1"></i><span>'+escHtml(String(fVal))+'</span></div>'
              : '<div class="qa-iqa-val-empty"><i class="bi bi-hourglass-split me-1"></i><span style="color:var(--txt-muted);">ยังไม่มีข้อมูล</span></div>';
            secHtml += '<div class="qa-iqa-field-row" style="padding-left:20px;">'
              +'<div class="qa-iqa-field-label"><i class="bi bi-arrow-return-right me-1" style="color:var(--txt-muted);font-size:.75rem;"></i>'+escHtml(fld.label)+'</div>'
              +'<div class="qa-iqa-field-val">'+fValHtml+'</div></div>';
          });
        }
      });

    } else {
      // ── Legacy format (page.sections + APP.iqaMapping[label]) ──
      var mapping  = (APP.iqaMapping||{})[page.id] || {};
      var sections = (page.sections||[]).filter(function(s){ return s && s.trim(); });
      sections.forEach(function(label) {
        var mapVal   = mapping[label] || {};
        var formId   = mapVal.formId   || "";
        var fieldKey = mapVal.fieldKey || "";
        var secId    = "";
        var formObj  = formId ? (APP.forms||[]).find(function(f){return f.formId===formId;}) : null;
        if (formObj && formObj.sectionId) {
          secId = formObj.sectionId;
        } else if (formObj && fieldKey) {
          var fldDef = (formObj.fields||[]).find(function(ff){return ff.key===fieldKey;});
          if (fldDef && fldDef.sectionIds && fldDef.sectionIds.length) secId = fldDef.sectionIds[0];
          else { var fs=(APP.sections||[]).find(function(s){return s.isActive;}); if(fs)secId=fs.sectionId; }
        } else if (formObj) {
          var anyFld = (formObj.fields||[]).find(function(ff){return ff.sectionIds&&ff.sectionIds.length;});
          if (anyFld) secId = anyFld.sectionIds[0];
          if (!secId) { var fs2=(APP.sections||[]).find(function(s){return s.isActive;}); if(fs2)secId=fs2.sectionId; }
        }
        var sub = (secId && year)
          ? (APP.dashboard||[]).find(function(d){return d.sectionId===secId&&String(d.year)===String(year);})
          : null;
        var valHtml = '';
        if (formId && fieldKey) {
          mappedCount++;
          var dObj = {}; if(sub){try{dObj=JSON.parse(sub.dataJson||"{}");}catch(e){}}
          var val = dObj[fieldKey];
          var hasVal = val !== undefined && val !== null && val !== "";
          if (hasVal) { dataCount++; }
          valHtml = hasVal
            ? '<div class="qa-iqa-val-mapped"><i class="bi bi-check-circle-fill me-1"></i><strong>'+(formObj?escHtml(formObj.formName):formId)+'</strong> › <span>'+escHtml(String(val))+'</span></div>'
            : '<div class="qa-iqa-val-empty"><i class="bi bi-hourglass-split me-1"></i><strong>'+(formObj?escHtml(formObj.formName):formId)+'</strong> › <span style="color:var(--txt-muted);">ยังไม่มีข้อมูลในปีนี้</span></div>';
        } else if (formId) {
          mappedCount++;
          var dObjF = {}; if(sub){try{dObjF=JSON.parse(sub.dataJson||"{}");}catch(e){}}
          var hasAny = Object.keys(dObjF).length > 0;
          if (hasAny) dataCount++;
          valHtml = '<div class="qa-iqa-val-'+(hasAny?"mapped":"empty")+'"><i class="bi bi-'+(hasAny?"check-circle-fill":"hourglass-split")+' me-1"></i><span>'+(formObj?escHtml(formObj.formName):formId)+'</span> <span style="color:var(--txt-muted);">— ภาพรวม Form</span></div>';
        } else {
          valHtml = '<div class="qa-iqa-val-none">ยังไม่ได้ Mapping</div>';
        }
        secHtml += '<div class="qa-iqa-field-row"><div class="qa-iqa-field-label">'+escHtml(label)+'</div>'
          +'<div class="qa-iqa-field-val">'+valHtml+'</div></div>';
      });
    }

    var pctFill    = mappedCount > 0 ? Math.round(dataCount/mappedCount*100) : 0;
    var badgeColor = pctFill===100 ? "var(--success)" : pctFill>0 ? "var(--warning)" : "var(--danger)";
    var badgeBg    = pctFill===100 ? "var(--success-l)" : pctFill>0 ? "var(--warning-l)" : "var(--surface-3)";
    var badge = mappedCount > 0
      ? '<span style="background:'+badgeBg+';color:'+badgeColor+';padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700;flex-shrink:0;">'
        +'<i class="bi bi-bar-chart-fill me-1"></i>'+dataCount+'/'+mappedCount+' ('+pctFill+'%)</span>'
      : '<span style="background:var(--surface-3);color:var(--txt-muted);padding:2px 9px;border-radius:20px;font-size:.67rem;flex-shrink:0;">ยังไม่ Mapped</span>';

    var bodyId = "iqa-pub-body-"+pfx+pi;
    return '<div class="qa-iqa-pub-card">'
      +'<div class="qa-iqa-pub-head" onclick="iqaPubToggle(\''+bodyId+'\')">'
      +'<i class="bi bi-chevron-right" id="arr-'+bodyId+'" style="transition:.2s;color:var(--txt-muted);flex-shrink:0;font-size:.8rem;"></i>'
      +'<span style="font-size:.7rem;background:var(--info-l);color:var(--info);padding:2px 9px;border-radius:20px;font-weight:700;flex-shrink:0;">'+escHtml(page.phaseName||page.phase||"")+'</span>'
      +'<span style="font-weight:700;font-size:.86rem;color:var(--txt);flex:1;">'+escHtml(page.name)+'</span>'
      +badge
      +(page.route?'<span style="font-size:.68rem;color:var(--txt-muted);font-family:monospace;flex-shrink:0;">'+escHtml(page.route)+'</span>':"")
      +'</div>'
      +'<div class="qa-iqa-pub-body" id="'+bodyId+'">'
      +(page.route?'<div style="font-size:.74rem;color:var(--info);margin-bottom:12px;padding:6px 10px;background:var(--info-l);border-radius:var(--r-sm);">'
        +'<i class="bi bi-link-45deg me-1"></i>URL: <strong>https://iqa.ovec.go.th'+escHtml(page.route)+'</strong></div>':"")
      +secHtml
      +'</div></div>';
  }).join('');
}

// Toggle accordion card
function iqaPubToggle(bodyId) {
  var el  = document.getElementById(bodyId);
  var arr = document.getElementById("arr-"+bodyId);
  if (!el) return;
  var isOpen = el.classList.contains("open");
  el.classList.toggle("open", !isOpen);
  if (arr) arr.style.transform = isOpen ? "" : "rotate(90deg)";
}
</script>
